<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST INGESA 2021 · Enfermería ATS/DUE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f8f5f0;
    --white: #ffffff;
    --accent: #1a5a8a;
    --accent-dark: #0e3a5a;
    --accent-light: #d0e8f8;
    --gold: #c09010;
    --gold-light: #fffce6;
    --red: #c04020;
    --green: #1a7a3a;
    --green-light: #e8f5ec;
    --red-light: #fdf0ed;
    --orange: #e07020;
    --text: #1a1a2e;
    --text-soft: #4a4a6a;
    --border: #d8d0c8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 100%);
    padding: 28px 32px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,255,255,0.03) 20px, rgba(255,255,255,0.03) 40px);
  }
  .site-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: #fff;
    letter-spacing: 1px;
    position: relative;
  }
  .site-header .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.75);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
    position: relative;
  }
  .header-pills {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin-top: 14px; position: relative;
  }
  .pill {
    background: rgba(255,255,255,0.15);
    color: #fff;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    border: 1px solid rgba(255,255,255,0.25);
  }

  /* CONTROL PANEL */
  .controls {
    background: var(--white);
    border-bottom: 2px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .controls-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .filter-btn {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    color: var(--text-soft);
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .spacer { flex: 1; }
  .score-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent-dark);
    background: var(--accent-light);
    padding: 6px 14px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .reset-btn {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.5px;
  }
  .reset-btn:hover { opacity: 0.85; }

  /* MAIN LAYOUT */
  .main-wrapper {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* SECTION HEADERS */
  .section-header {
    background: var(--accent);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px 8px 0 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 32px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-header.supuesto { background: #6a1a8a; }
  .section-count {
    background: rgba(255,255,255,0.25);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.68rem;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-top: none;
    padding: 20px 22px;
    transition: all 0.2s;
  }
  .question-card:last-child { border-radius: 0 0 8px 8px; }
  .question-card + .question-card { border-top: 1px solid var(--border); }

  .question-card.answered-correct { border-left: 4px solid var(--green); background: #fafffe; }
  .question-card.answered-wrong { border-left: 4px solid var(--red); background: #fffafa; }
  .question-card.hidden { display: none; }

  .q-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 0.97rem;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 14px;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 7px; }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 10px 14px;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.91rem;
    color: var(--text);
    text-align: left;
    transition: all 0.15s;
    line-height: 1.45;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-light);
    transform: translateX(2px);
  }
  .option-btn:disabled { cursor: default; }
  .option-letter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 700;
    min-width: 22px;
    color: var(--accent);
    margin-top: 1px;
  }

  .option-btn.correct {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--text);
  }
  .option-btn.correct .option-letter { color: var(--green); }
  .option-btn.wrong {
    background: var(--red-light);
    border-color: var(--red);
  }
  .option-btn.wrong .option-letter { color: var(--red); }
  .option-btn.dimmed {
    opacity: 0.5;
  }

  /* EXPLANATION */
  .explanation {
    margin-top: 12px;
    background: var(--gold-light);
    border: 1px solid #e0c020;
    border-radius: 7px;
    padding: 12px 14px;
    font-size: 0.88rem;
    line-height: 1.55;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .explanation.show { display: block; }
  .explanation .exp-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .explanation p { color: var(--text); }
  .explanation strong { color: var(--accent-dark); }

  .result-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 12px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .badge-correct { background: var(--green-light); color: var(--green); border: 1px solid var(--green); }
  .badge-wrong { background: var(--red-light); color: var(--red); border: 1px solid var(--red); }

  /* PROGRESS BAR */
  .progress-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 5px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* SUMMARY */
  .summary-box {
    background: var(--white);
    border: 2px solid var(--accent);
    border-radius: 10px;
    padding: 24px;
    margin-top: 32px;
    text-align: center;
    display: none;
  }
  .summary-box.show { display: block; }
  .summary-score {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    color: var(--accent);
    line-height: 1;
  }
  .summary-detail {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-soft);
    margin-top: 8px;
    letter-spacing: 1px;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 20px;
  }
  .summary-stat {
    background: var(--cream);
    border-radius: 8px;
    padding: 14px;
  }
  .summary-stat .num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
  }
  .summary-stat .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-soft);
    margin-top: 4px;
  }
  .num-green { color: var(--green); }
  .num-red { color: var(--red); }
  .num-orange { color: var(--orange); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    .site-header h1 { font-size: 1.5rem; }
    .controls { padding: 12px 14px; }
    .main-wrapper { padding: 16px 12px 40px; }
    .summary-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<header class="site-header">
  <h1>TEST INGESA 2021</h1>
  <div class="subtitle">Enfermería ATS · DUE · Examen Oficial</div>
  <div class="header-pills">
    <span class="pill">100 Preguntas</span>
    <span class="pill">2 Supuestos Prácticos</span>
    <span class="pill">Respuestas comentadas</span>
    <span class="pill">INGESA 2026 Prep</span>
    <span class="pill" style="background:rgba(192,144,16,0.4);border-color:rgba(224,192,32,0.6);">✓ Respuestas auditadas</span>
  </div>
</header>

<div class="controls">
  <span class="controls-label">Mostrar:</span>
  <button class="filter-btn active" onclick="filterQuestions('all')">Todas</button>
  <button class="filter-btn" onclick="filterQuestions('unanswered')">Sin contestar</button>
  <button class="filter-btn" onclick="filterQuestions('wrong')">Falladas</button>
  <button class="filter-btn" onclick="filterQuestions('correct')">Correctas</button>
  <div class="spacer"></div>
  <div class="score-display" id="scoreDisplay">0 / 0 respondidas</div>
  <button class="reset-btn" onclick="resetAll()">↺ Reiniciar</button>
</div>

<div class="main-wrapper">
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="questionsContainer"></div>

  <div class="summary-box" id="summaryBox">
    <div class="summary-score" id="summaryScore">—</div>
    <div class="summary-detail" id="summaryDetail">RESULTADO FINAL</div>
    <div class="summary-grid">
      <div class="summary-stat">
        <div class="num num-green" id="statCorrect">0</div>
        <div class="lbl">✓ Correctas</div>
      </div>
      <div class="summary-stat">
        <div class="num num-red" id="statWrong">0</div>
        <div class="lbl">✗ Falladas</div>
      </div>
      <div class="summary-stat">
        <div class="num num-orange" id="statSkipped">0</div>
        <div class="lbl">— Sin contestar</div>
      </div>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
  // PRIMERA PARTE (100 preguntas)
  {
    id: 1, section: "primera",
    text: "Se produce un sesgo de selección cuando:",
    options: [
      "El error se realiza en la recogida de datos.",
      "La muestra del estudio no representa de forma adecuada a la población diana.",
      "Se produce un error sistemático en la medición de las variables.",
      "Debido a la relación que mantienen en la población base variables con la exposición y el efecto."
    ],
    correct: 1,
    explanation: "<strong>B es correcta.</strong> El sesgo de selección ocurre cuando la muestra no es representativa de la población diana. La opción A describe un sesgo de información, la C un sesgo de medición (también información), y la D el sesgo de confusión."
  },
  {
    id: 2, section: "primera",
    text: "En muestra de recién nacidos los cuartiles de la distribución del peso al nacimiento son 2700 gramos, 3150 gramos y 3400 gramos. Los sujetos que pesan más de 2700 gramos representan:",
    options: [
      "El 25 por ciento de la distribución.",
      "El 75 por ciento de la distribución.",
      "El 50 por ciento de la distribución.",
      "La mediana de la distribución."
    ],
    correct: 1,
    explanation: "<strong>B es correcta.</strong> 2700 g es el primer cuartil (Q1 = P25). Por encima del Q1 se encuentra el 75% de la distribución. El Q2 (mediana) sería 3150 g, y el Q3 sería 3400 g."
  },
  {
    id: 3, section: "primera",
    text: "¿Cuál de los siguientes enunciados NO se encuentra entre los usos principales de la Epidemiología?",
    options: [
      "Establecimiento de normas de organización y de la atención médica.",
      "Establecer la magnitud y distribución de la salud-enfermedad.",
      "Completar cuadros clínicos.",
      "Describir la historia natural de la enfermedad y los determinantes de su curso."
    ],
    correct: 0,
    explanation: "<strong>A es correcta.</strong> Establecer normas de organización sanitaria es función de la política sanitaria y la gestión, no de la Epidemiología. Los usos epidemiológicos incluyen: describir distribución de enfermedades, identificar factores de riesgo, completar cuadros clínicos, evaluar intervenciones y planificar servicios."
  },
  {
    id: 4, section: "primera",
    text: "¿Qué se entiende por envejecimiento demográfico de la población?",
    options: [
      "El aumento de la edad de las personas a medida que pasan los años.",
      "El aumento del número absoluto de personas ancianas debido a su mayor supervivencia.",
      "El deterioro de las condiciones de vida por falta de población en edad de trabajar.",
      "El aumento del peso relativo de las personas mayores debido a la reducción de la mortalidad y la natalidad."
    ],
    correct: 3,
    explanation: "<strong>D es correcta.</strong> El envejecimiento demográfico es un fenómeno poblacional que implica el aumento del PESO RELATIVO (no absoluto) de las personas mayores en la pirámide de población, debido tanto a la reducción de la mortalidad (↑ longevidad) como de la natalidad. La opción B describe crecimiento absoluto, no relativo."
  },
  {
    id: 5, section: "primera",
    text: "¿Cuál de las siguientes acciones sería una estrategia de promoción de salud?",
    options: [
      "Acciones encaminadas a ampliar la realización de pruebas de cribado de cáncer de colón en la población.",
      "Instalación de máquinas expendedoras de preservativos en red de estaciones de transporte y centros comerciales.",
      "Creación de Foros de integración y mesas de convivencia en zonas en riesgo de exclusión.",
      "Programa de vacunación contra la gripe en personas mayores."
    ],
    correct: 2,
    explanation: "<strong>C es correcta.</strong> La promoción de salud actúa sobre los DETERMINANTES SOCIALES de la salud (Carta de Ottawa 1986). Los foros de integración atacan el determinante 'exclusión social'. A y D son prevención primaria; B es una medida de reducción de daño/prevención secundaria de ITS."
  },
  {
    id: 6, section: "primera",
    text: "De acuerdo con la evidencia científica generada hasta el momento entorno a los mecanismos de transmisión del virus SARS-CoV-2, ¿cuál de los siguientes enunciados es verdadero?",
    options: [
      "En tiempo prolongado de exposición, los virus contenidos en los aerosoles pierden capacidad de generar infección.",
      "Se considera que el riesgo de transmisión de SARS-CoV-2 a través de la sangre o hemoderivados es muy alto.",
      "Los aerosoles pueden considerarse una vía de transmisión del virus. Dichos aerosoles pueden depositarse tanto en conjuntiva y la mucosa del tracto respiratorio superior, como ser inhalados, llegando a cualquier tramo del tracto respiratorio.",
      "No se han detectado ningún caso de transmisión vertical a través de la placenta y/o contacto estrecho entre madre hijo producido tras el nacimiento."
    ],
    correct: 2,
    explanation: "<strong>C es correcta.</strong> La transmisión por aerosoles es una vía documentada para SARS-CoV-2, alcanzando cualquier nivel del tracto respiratorio. El riesgo por sangre/hemoderivados es muy BAJO (A es falsa). La transmisión vertical SÍ se ha documentado aunque sea poco frecuente (D es falsa)."
  },
  {
    id: 7, section: "primera",
    text: "El conjunto de las razones que expresan los actos de un individuo es lo que llamamos:",
    options: ["Confianza mutua.", "Comunicación.", "Creatividad.", "Motivación."],
    correct: 3,
    explanation: "<strong>D es correcta.</strong> La motivación es el conjunto de razones que impulsan y explican los actos de una persona. Concepto clave en psicología organizacional (Maslow, Herzberg, McClelland)."
  },
  {
    id: 8, section: "primera",
    text: "Señale la respuesta correcta. Entre los objetivos del proyecto de Historia Clínica digital encontramos:",
    options: [
      "Garantizar al paciente y familiares de primer grado, el acceso por vía telemática a los datos de salud que se encuentren disponibles en formato digital en todos los Servicios de Salud que se integran en el SNS.",
      "Garantizar a los profesionales sanitarios y no sanitarios, el acceso a la totalidad de datos de salud, generados en una comunidad autónoma distinta de la de residencia del ciudadano.",
      "Dotar al SNS de un sistema seguro de acceso que garantice al ciudadano la confidencialidad de los datos de carácter personal relativos a su salud.",
      "El sistema a desarrollar deberá dotarse de agilidad y complejidad en el acceso, al servicio de ciudadanos y profesionales."
    ],
    correct: 2,
    explanation: "<strong>C es correcta.</strong> La HCE-SNS busca garantizar la confidencialidad de datos de salud. A es incorrecta (no acceso de familiares). B es incorrecta (solo profesionales SANITARIOS, no todos). D es incorrecta (debe ser simple, no compleja)."
  },
  {
    id: 9, section: "primera",
    text: "Señale los signos de alarma que deben hacer sospechar de la existencia de una situación de maltrato en el niño:",
    options: [
      "Dermatitis del pañal que no remite al tratamiento.",
      "Lesiones cutáneas, quemaduras pequeñas redondas y profundas.",
      "No asistencia a un control de salud previamente citado.",
      "Intoxicación por ansiolíticos o antidepresivos."
    ],
    correct: 1,
    explanation: "<strong>B es correcta.</strong> Las quemaduras pequeñas, redondas y profundas son muy sugestivas de quemaduras por cigarrillo, hallazgo altamente sospechoso de maltrato físico infantil. A y C pueden deberse a descuido/negligencia pero no son específicos. D podría ser accidental."
  },
  {
    id: 10, section: "primera",
    text: "La enfermería ejerce un papel fundamental en el seguimiento del paciente de hepatitis. Es fundamental que el paciente esté bien informado. ¿Cuál de los siguientes enunciados es correcto?",
    options: [
      "Explicar a los familiares y no al propio paciente, la importancia de reposo físico y verificar su cumplimiento.",
      "En caso de tratarse de un virus que se transmite por vía fecal-oral (virus A y E) se recomienda mantener los objetos de uso personal aislados del resto.",
      "Si el paciente padece la hepatitis E, una de las medidas será la de tomar precauciones con la sangre.",
      "La dieta debe ser normograsa, normoproteica y hipercalórica."
    ],
    correct: 1,
    explanation: "<strong>B es correcta.</strong> Hepatitis A y E se transmiten por vía fecal-oral → aislar objetos de uso personal (vajilla, cubiertos, etc.) es correcto. Hepatitis E NO requiere precauciones con sangre (C falsa). La dieta en hepatitis es hipograsa, no normograsa (D falsa)."
  },
  {
    id: 11, section: "primera",
    text: "Ante la complicación potencial de asfixia y traumatismo secundario a una crisis convulsiva en un niño, realizaremos:",
    options: [
      "Administración de una bebida glucosada para recuperar totalmente la conciencia más rápido.",
      "Sujetar al niño de forma que se le impida el movimiento evitando que se golpee.",
      "No utilizar, bajo ninguna circunstancia, un depresor de lengua, ya que puede producir lesiones orales.",
      "Administrar oxígeno."
    ],
    correct: 3,
    explanation: "<strong>D es correcta.</strong> Ante convulsión pediátrica: administrar O₂ con mascarilla es la intervención CORRECTA. <strong>NUNCA sujetar al niño con fuerza</strong> — puede causar fracturas o luxaciones (B falsa). <strong>NUNCA introducir nada en la boca</strong>: ni depresor ni cuchara — el niño no se traga la lengua pero sí puede lesionarse con objetos (C falsa en su premisa real). <strong>NUNCA dar bebidas</strong> a paciente con consciencia alterada: riesgo de broncoaspiración (A falsa). El O₂ y proteger el entorno son las intervenciones correctas."
  },
  {
    id: 12, section: "primera",
    text: "Una de las principales manifestaciones clínicas que presenta un paciente con EPOC es:",
    options: [
      "Dedos en martillo.",
      "Fase espiratoria disminuida.",
      "Respiración con labios fruncidos.",
      "Tos seca."
    ],
    correct: 2,
    explanation: "<strong>C es correcta.</strong> La respiración con labios fruncidos (pursed-lip breathing) es un signo característico del EPOC; prolonga la espiración y evita el colapso de vías aéreas. En EPOC la fase ESPIRATORIA está PROLONGADA (no disminuida). La tos es productiva con esputo, no seca."
  },
  {
    id: 13, section: "primera",
    text: "Según el modelo PRECEDE, cuando nos referimos a 'los distintos factores internos que suponen una motivación para actuar en una persona o en grupo', estamos indicando:",
    options: [
      "Factores predisponentes.",
      "Factores facilitadores.",

// STATE
let answered = {};
let currentFilter = 'all';

function buildQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';

  const sections = [
    { key: 'primera', label: 'PRIMERA PARTE — Cuestionario Test', count: '100 preguntas' },
    { key: 'supuesto1', label: 'SEGUNDA PARTE — Supuesto Práctico 1 (José Ramón, 72 años)', count: '15 preguntas' },
    { key: 'supuesto2', label: 'SEGUNDA PARTE — Supuesto Práctico 2 (Cáncer colorrectal)', count: '15 preguntas' },
  ];

  sections.forEach(sec => {
    const qs = QUESTIONS.filter(q => q.section === sec.key);
    if (!qs.length) return;

    const header = document.createElement('div');
    header.className = `section-header${sec.key !== 'primera' ? ' supuesto' : ''}`;
    header.innerHTML = `${sec.label} <span class="section-count">${sec.count}</span>`;
    container.appendChild(header);

    qs.forEach(q => {
      const card = document.createElement('div');
      card.className = 'question-card';
      card.id = `qcard-${q.id}`;

      const letters = ['A', 'B', 'C', 'D'];
      const optHtml = q.options.map((opt, i) => `
        <button class="option-btn" id="opt-${q.id}-${i}" onclick="selectAnswer('${q.id}', ${i})">
          <span class="option-letter">${letters[i]}</span>
          <span>${opt}</span>
        </button>
      `).join('');

      card.innerHTML = `
        <div class="q-number">PREGUNTA ${q.id} <span id="badge-${q.id}"></span></div>
        <div class="q-text">${q.text}</div>
        <div class="options">${optHtml}</div>
        <div class="explanation" id="exp-${q.id}">
          <div class="exp-header">★ Comentario / Clave de respuesta</div>
          <p>${q.explanation}</p>
        </div>
      `;
      container.appendChild(card);
    });
  });
}

function selectAnswer(qid, selectedIdx) {
  if (answered[qid] !== undefined) return;

  const q = QUESTIONS.find(q => String(q.id) === String(qid));
  answered[qid] = selectedIdx;

  const isCorrect = selectedIdx === q.correct;
  const card = document.getElementById(`qcard-${qid}`);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  const badge = document.getElementById(`badge-${qid}`);
  badge.innerHTML = `<span class="result-badge ${isCorrect ? 'badge-correct' : 'badge-wrong'}">${isCorrect ? '✓ CORRECTO' : '✗ INCORRECTO'}</span>`;

  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById(`opt-${qid}-${i}`);
    btn.disabled = true;
    if (i === q.correct) {
      btn.classList.add('correct');
    } else if (i === selectedIdx && !isCorrect) {
      btn.classList.add('wrong');
    } else {
      btn.classList.add('dimmed');
    }
  }

  document.getElementById(`exp-${qid}`).classList.add('show');
  updateScore();
}

function updateScore() {
  const total = QUESTIONS.length;
  const ans = Object.keys(answered).length;
  const correct = Object.values(answered).filter((v, i) => {
    const qid = Object.keys(answered)[i];
    const q = QUESTIONS.find(q => String(q.id) === String(qid));
    return q && v === q.correct;
  }).length;

  document.getElementById('scoreDisplay').textContent = `${correct} correctas · ${ans} / ${total} respondidas`;

  const pct = (ans / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';

  if (ans === total) showSummary(correct, total);
}

function showSummary(correct, total) {
  const wrong = Object.keys(answered).length - correct;
  const skipped = total - Object.keys(answered).length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('summaryScore').textContent = `${pct}%`;
  document.getElementById('summaryDetail').textContent = `${correct} correctas de ${total} preguntas`;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statSkipped').textContent = skipped;
  document.getElementById('summaryBox').classList.add('show');
}

function filterQuestions(mode) {
  currentFilter = mode;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  QUESTIONS.forEach(q => {
    const card = document.getElementById(`qcard-${q.id}`);
    if (!card) return;
    let show = true;
    if (mode === 'unanswered') show = answered[q.id] === undefined;
    else if (mode === 'wrong') show = answered[q.id] !== undefined && answered[q.id] !== q.correct;
    else if (mode === 'correct') show = answered[q.id] !== undefined && answered[q.id] === q.correct;
    card.classList.toggle('hidden', !show);
  });

  // Hide section headers with no visible questions
  document.querySelectorAll('.section-header').forEach(h => {
    let next = h.nextElementSibling;
    let hasVisible = false;
    while (next && !next.classList.contains('section-header')) {
      if (!next.classList.contains('hidden')) hasVisible = true;
      next = next.nextElementSibling;
    }
    h.style.display = hasVisible ? '' : 'none';
  });
}

function resetAll() {
  if (!confirm('¿Seguro que quieres reiniciar el test? Se perderán todas tus respuestas.')) return;
  answered = {};
  document.getElementById('summaryBox').classList.remove('show');
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('scoreDisplay').textContent = '0 / 0 respondidas';
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach((b, i) => { b.classList.toggle('active', i === 0); });
  buildQuestions();
}

// INIT
buildQuestions();
updateScore();
</script>
