</ul>`},
    {key:'sp2',label:'SUPUESTO PRÁCTICO 2 — ANTONIO',sub:'78 años · HTA · DM tipo 2 · Obesidad · Riesgo de caídas',
     cs:`<strong>Datos del caso</strong>
Antonio González, 78 años. Mecánico jubilado. Fumador 20 cig/día. IMC: 33.2.
Antecedentes: HTA (Enalapril 20mg), DM tipo 2 (sulfonilureas Amaryl 4mg), Hipercolesterolemia 280mg/dl.
<br><br><strong>Tratamiento</strong>: Omeprazol 20mg · Nolotil (1-1-1) · Ibuprofeno 400mg · Lorazepam 1/24h (noche)
<br><br><strong>Problemas</strong>: Dolor rodillas y zona lumbar/dorsal · Caídas ocasionales · Usa bastón · Insomnio de mantenimiento · Se siente triste ("ya no soy el mismo") · Escozor y dolor al orinar · Deposiciones frecuentes
<br><br><strong>Cuidadora principal</strong>: esposa 62 años (HTA, artrosis) · refiere cansancio`}
  ];
  
  secs.forEach(s=>{
    const qs=QS.filter(q=>q.sec===s.key);
    const hdiv=document.createElement('div');
    hdiv.className='shdr';
    hdiv.innerHTML=`<span>${s.label}</span><span class="sbadge">${qs.length} preguntas</span><span class="sbadge">${s.sub}</span>`;
    cont.appendChild(hdiv);
    
    if(s.cs){
      const cd=document.createElement('div');
      cd.className='scase';
      cd.innerHTML=s.cs;
      cont.appendChild(cd);
    }
    
    const qdiv=document.createElement('div');
    qdiv.className='qs';
    qdiv.style.padding='0 32px';
    qs.forEach(q=>{
      qdiv.appendChild(buildCard(q));
    });
    cont.appendChild(qdiv);
  });
}

function buildCard(q){
  const s=state[q.id];
  const div=document.createElement('div');
  div.className='qc';
  div.id='card_'+q.id;
  if(s.ans){
    div.classList.add(s.ans===q.ans?'ac':'aw');
  }
  
  const secMap={p:'p',reserva:'reserva',sp1:'sp1',sp2:'sp2'};
  let tags=`<span class="qtag ${secMap[q.sec]}">${q.sec==='p'?'1ª Parte':q.sec==='reserva'?'Reserva':q.sec==='sp1'?'Supuesto 1':'Supuesto 2'}</span>`;
  if(q.obs) tags+=`<span class="qtag obs">⚠ ACTUALIZADA</span>`;
  
  let qtext=q.q;
  if(q.obs) qtext+=' <span class="obs-note">⚠ Evidencia actualizada</span>';
  
  const disb=s.ans?'disabled':'';
  const opts=q.opts.map((o,i)=>{
    const letter=['A','B','C','D'][i];
    let cls='ob';
    if(s.ans){
      if(letter===q.ans) cls+=' oc';
      else if(letter===s.ans) cls+=' ow';
    }
    return `<button class="${cls}" onclick="answer('${q.id}','${letter}')" ${disb}><span class="ol">${letter}</span>${o}</button>`;
  }).join('');
  
  const fbCls=s.ans?(s.ans===q.ans?'fb2 ok show':'fb2 fail show'):'fb2';
  const fbHeader=s.ans?(s.ans===q.ans?'✓ CORRECTO':'✗ INCORRECTO'):'';
  
  div.innerHTML=`
    <div class="qnb"><span class="qnum">Pregunta ${q.n}</span>${tags}</div>
    <div class="qb">
      <div class="qt">${qtext}</div>
      <div class="opts">${opts}</div>
    </div>
    <div class="${fbCls}">
      <strong>${fbHeader}</strong>
      ${q.exp}
      <div class="ev">📚 ${q.ev}</div>
    </div>`;
  return div;
}

function answer(id,letter){
  const q=QS.find(x=>x.id===id);
  if(!q||state[id].ans) return;
  state[id].ans=letter;
  
  const card=document.getElementById('card_'+id);
  card.classList.add(letter===q.ans?'ac':'aw');
  
  // Update buttons
  card.querySelectorAll('.ob').forEach((btn,i)=>{
    const l=['A','B','C','D'][i];
    btn.disabled=true;
    if(l===q.ans) btn.classList.add('oc');
    else if(l===letter) btn.classList.add('ow');
  });
  
  const fb=card.querySelector('.fb2');
  fb.classList.add('show');
  fb.classList.add(letter===q.ans?'ok':'fail');
  const h=fb.querySelector('strong');
  h.textContent=letter===q.ans?'✓ CORRECTO':'✗ INCORRECTO';
  
  updateStats();
}

function updateStats(){
  let t=0,c=0,w=0;
  QS.forEach(q=>{
    if(state[q.id].ans){t++;if(state[q.id].ans===q.ans)c++;else w++;}
  });
  document.getElementById('sT').textContent=t;
  document.getElementById('sC').textContent=c;
  document.getElementById('sW').textContent=w;
  document.getElementById('sP').textContent=t>0?Math.round(c/t*100)+'%':'—';
  const pct=t/QS.length*100;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pLab').textContent=`${t} / ${QS.length}`;
  
  if(t===QS.length){
    const sp=document.getElementById('sumPanel');
    sp.classList.add('show');
    document.getElementById('smT').textContent=t;
    document.getElementById('smC').textContent=c;
    document.getElementById('smW').textContent=w;
    document.getElementById('smS').textContent=0;
    const nota=(c/QS.length*100).toFixed(1);
    document.getElementById('nF').textContent=`Nota: ${nota}% · ${c}/${QS.length} correctas`;
    sp.scrollIntoView({behavior:'smooth'});
  }
}

function resetAll(){
  if(!confirm('¿Reiniciar el test? Se perderán todas las respuestas.')) return;
  QS.forEach(q=>{state[q.id]={ans:null}});
  document.getElementById('sT').textContent=0;
  document.getElementById('sC').textContent=0;
  document.getElementById('sW').textContent=0;
  document.getElementById('sP').textContent='—';
  document.getElementById('pFill').style.width='0';
  document.getElementById('pLab').textContent='0 / '+QS.length;
  document.getElementById('sumPanel').classList.remove('show');
  render();
}

function fQ(type,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.qc').forEach(card=>{
    const id=card.id.replace('card_','');
    const q=QS.find(x=>x.id===id);
    if(!q){card.classList.add('hidden');return;}
    const s=state[id];
    let show=true;
    if(type==='p') show=q.sec==='p';
    else if(type==='reserva') show=q.sec==='reserva';
    else if(type==='sp1') show=q.sec==='sp1';
    else if(type==='sp2') show=q.sec==='sp2';
    else if(type==='pend') show=!s.ans;
    else if(type==='wrong') show=s.ans&&s.ans!==q.ans;
    card.classList.toggle('hidden',!show);
  });
}

render();
updateStats();
</script>
</body>
</html>
