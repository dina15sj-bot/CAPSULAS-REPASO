<script>
const QS=[
// PRIMERA PARTE
{id:'p1',n:'1',sec:'p',q:'De entre las siguientes sustancias empleadas en limpieza, desinfección y esterilización, ¿cuál de ellas puede ser potencialmente carcinogénica en caso de accidente?',opts:['Cloro','Óxido de etileno','Yodo','Fenol'],ans:'B',exp:'El <strong>óxido de etileno</strong> es clasificado como carcinógeno Grupo 1 por la IARC. Se usa para esterilizar material termosensible y requiere estrictas medidas de seguridad.',ev:'IARC Monographs Vol.60'},
{id:'p2',n:'2',sec:'p',q:'Indique qué libertades públicas tienen los extranjeros en España según la vigente Constitución Española:',opts:['Las mismas que tienen los españoles en su país de origen','Las mismas que para los españoles se reconocen en el artículo 23 de la Constitución','Las que se les reconocen a los españoles, en los términos que establezcan los tratados y la ley','En todo caso gozarán de asilo político'],ans:'C',exp:'Art. 13 CE: los extranjeros gozarán de las libertades públicas del Título I en los <strong>términos que establezcan los tratados y la ley</strong>.',ev:'CE Art. 13.1'},
{id:'p3',n:'3',sec:'p',q:'Señale cómo se denomina la respiración normal en un paciente en cuanto a la frecuencia:',opts:['Eupnea','Apnea','Taquipnea','Bradipnea'],ans:'A',exp:'<strong>Eupnea</strong>: respiración normal (12-20 rpm). Apnea=cese. Taquipnea>20 rpm. Bradipnea<12 rpm.',ev:'Fisiopatología básica'},
{id:'p4',n:'4',sec:'p',q:'Según la LO 2/2009, señale la respuesta correcta respecto a la asistencia sanitaria de extranjeros en España:',opts:['Los extranjeros menores de dieciocho años tienen derecho a la asistencia sanitaria en las mismas condiciones que los españoles','Los extranjeros que se encuentren en España tienen derecho a la asistencia sanitaria en las mismas condiciones que los españoles','Los extranjeros en España tienen derecho únicamente a urgencias si acreditan insuficiencia económica','Las extranjeras embarazadas tienen derecho a asistencia solo si acreditan insuficiencia económica'],ans:'A',exp:'LO 2/2009 art. 3ter: los <strong>menores de 18 años extranjeros</strong> tienen asistencia sanitaria en igualdad de condiciones que los españoles. Los adultos irregulares acceden a urgencias y servicios específicos.',ev:'LO 2/2009 Art. 12'},
{id:'p5',n:'5',sec:'p',q:'En relación con la actividad física la OMS recomienda:',opts:['Practicar actividad física de forma regular, independientemente de la edad de la persona y del tipo de ejercicio que se realice','La recomendación actual es de 90 minutos de ejercicio de intensidad moderada todos los días','Un tipo de actividad según la patología de base','Para evitar lesiones, hacer ejercicio físico con preparadores expertos'],ans:'A',exp:'La OMS recomienda actividad física regular para todas las edades. Guías 2020: 150-300 min/semana AF moderada. La opción B es incorrecta en la dosis.',ev:'WHO Physical Activity Guidelines 2020'},
{id:'p6',n:'6',sec:'p',q:'¿Quiénes son titulares del derecho a la protección de la salud según la Ley 14/1986 General de Sanidad?',opts:['Todos los españoles y los ciudadanos extranjeros que tengan establecida su residencia en el territorio nacional','Sólo los españoles que residan en territorio nacional','Sólo los españoles con independencia de que residan en territorio nacional o en el extranjero','Todos los españoles y los extranjeros que tengan la nacionalidad española'],ans:'A',exp:'Art. 1.2 LGS: titulares son todos los españoles y los <strong>ciudadanos extranjeros con residencia establecida en territorio nacional</strong>.',ev:'Ley 14/1986 Art. 1.2'},
{id:'p7',n:'7',sec:'p',q:'Indique la respuesta correcta en relación a la Carrera Profesional en INGESA:',opts:['Tiene carácter voluntario','El tratamiento de la Carrera Profesional es por grupos profesionales y no individualizado','El tratamiento y su adjudicación es impersonal','Depende del Nivel Jerárquico de responsabilidad'],ans:'B',exp:'En INGESA la Carrera Profesional tiene carácter <strong>colectivo por grupos profesionales</strong>, no individual ni voluntario.',ev:'Resolución INGESA Carrera Profesional'},
{id:'p8',n:'8',sec:'p',q:'Entre los objetivos del art. 1 del RDL 1/2013 (derechos de personas con discapacidad) se encuentra:',opts:['Alcanzar el pleno respeto por la diferencia y la aceptación','Establecer el régimen de infracciones y sanciones','Garantizar el derecho a la igualdad de oportunidades a través de políticas de discriminación positiva','Garantizar la transversalidad de las políticas en materia de discapacidad'],ans:'D',exp:'El RDL 1/2013 incluye como principio la <strong>transversalidad de las políticas</strong> en materia de discapacidad (Art. 3.j).',ev:'RDL 1/2013 Art. 1 y 3'},
{id:'p9',n:'9',sec:'p',q:'Desde el punto de vista estadístico, las variables de tipo discreto son:',opts:['Las que solo pueden alcanzar un determinado conjunto de valores','Las que pueden alcanzar un número infinito de valores fraccionados','Las que se pueden valorar en cualquier punto de una escala ininterrumpida','Nunca pueden ser medidas con exactitud'],ans:'A',exp:'Variables <strong>discretas</strong>: solo toman valores enteros o un conjunto finito (ej. nº hijos). Variables continuas: cualquier valor en un intervalo (ej. peso, TA).',ev:'Estadística básica'},
{id:'p10',n:'10',sec:'p',q:'Las funcionarias públicas víctimas de violencia de género:',opts:['Tendrán derecho a excedencia acreditando 2 años de antigüedad','Tendrán derecho a solicitar excedencia sin tiempo mínimo de servicios previos','Durante los 12 primeros meses tendrán derecho a reserva del puesto','Tendrán derecho a excedencia acreditando al menos 1 año de antigüedad'],ans:'B',exp:'LO 1/2004 + EBEP Art. 89.5: derecho a excedencia <strong>sin necesidad de tiempo mínimo de servicios previos</strong>. Duración inicial 6 meses prorrogable.',ev:'LO 1/2004; EBEP Art. 89.5'},
{id:'p11',n:'11',sec:'p',q:'El ámbito de actuación del Centro Nacional de Dosimetría comprende:',opts:['La Comunidad Valenciana y las ciudades autónomas de Ceuta y Melilla','La Comunidad de Castilla-La Mancha y las ciudades autónomas de Ceuta y Melilla','La Comunidad de Andalucía y las ciudades autónomas de Ceuta y Melilla','La totalidad del Sistema Nacional de Salud'],ans:'A',exp:'El <strong>Centro Nacional de Dosimetría</strong> tiene sede en Valencia y su ámbito cubre la Comunidad Valenciana y las CCAA de Ceuta y Melilla.',ev:'RD 815/2001; normativa CND'},
{id:'p12',n:'12',sec:'p',q:'La prioridad en el acceso a las prestaciones de la Ley 39/2006 de dependencia vendrá determinada por:',opts:['El grado de dependencia y, a igual grado, por la capacidad económica del solicitante','La capacidad económica del solicitante y en segundo término por su grado de dependencia','El grado de dependencia y, a igual grado, la capacidad económica de la unidad familiar','El grado de dependencia, la capacidad económica del solicitante y la de la unidad familiar'],ans:'A',exp:'Ley 39/2006 Art. 14: prioridad por <strong>grado de dependencia</strong> y a igual grado por <strong>capacidad económica del solicitante</strong>.',ev:'Ley 39/2006 Art. 14.6'},
{id:'p13',n:'13',sec:'p',q:'¿Cuál es el sistema general de selección del personal estatutario fijo según el art. 31.1 Ley 55/2003?',opts:['El concurso','La oposición','El concurso-oposición','La libre designación'],ans:'C',exp:'Art. 31.1 Ley 55/2003: el sistema general es el <strong>concurso-oposición</strong>.',ev:'Ley 55/2003 Art. 31.1'},
{id:'p14',n:'14',sec:'p',q:'La autora de la Teoría del Proceso Deliberativo de enfermería es:',opts:['Dorothy Johnson','Ida Jean Orlando','Callista Roy','Martha Rogers'],ans:'B',exp:'<strong>Ida Jean Orlando</strong> desarrolló la Teoría del Proceso de Enfermería Deliberativo (1961), centrada en la relación terapéutica y las necesidades del paciente.',ev:'Orlando IJ. The Dynamic Nurse-Patient Relationship. 1961'},
{id:'p15',n:'15',sec:'p',q:'¿A qué nos referimos con ISO-9000?',opts:['Son las siglas del Instituto Social de la Obsolescencia en Calidad','Al conjunto de normas sobre un sistema de gestión de la calidad de la ISO','Es un organismo que gestiona los hospitales con sello de Calidad máxima','Es una clasificación internacional de historias clínicas'],ans:'B',exp:'ISO 9000 es una familia de normas internacionales sobre <strong>sistemas de gestión de la calidad</strong> de la International Organization for Standardization.',ev:'ISO 9001:2015'},
{id:'p16',n:'16',sec:'p',q:'Según la LO 3/2018 de Protección de Datos, el consentimiento del menor para el tratamiento de sus datos es válido cuando sea mayor de:',opts:['Doce años','Trece años','Catorce años','Once años'],ans:'C',exp:'LOPDGDD Art. 7: el menor puede dar consentimiento para el tratamiento de sus datos a partir de los <strong>14 años</strong>. Por debajo requiere consentimiento del tutor.',ev:'LOPDGDD 3/2018 Art. 7'},
{id:'p17',n:'17',sec:'p',q:'Para obtener excedencia voluntaria por interés particular según la Ley 55/2003 será preciso:',opts:['Haber prestado servicios durante 3 años inmediatamente anteriores','Que el tiempo mínimo de permanencia en excedencia sea de 1 año','Haber prestado servicios durante 5 años inmediatamente anteriores','Que esté sometido a expediente disciplinario'],ans:'C',exp:'Ley 55/2003 Art. 68: se requieren <strong>5 años de servicios efectivos</strong> inmediatamente anteriores en cualquier AAPP.',ev:'Ley 55/2003 Art. 68'},
{id:'p18',n:'18',sec:'p',q:'La participación social en el SNS se ejercerá a través de:',opts:['El Consejo Interterritorial y el Foro Abierto','El Consejo Interterritorial, la Comisión Delegada y el Foro Virtual','El Comité Consultivo, el Foro Abierto de Salud y el Foro Virtual','El Comité Consultivo, la Comisión Delegada y el Foro Virtual'],ans:'C',exp:'Ley 16/2003 Art. 67: la participación social se ejerce a través del <strong>Comité Consultivo</strong>, el <strong>Foro Abierto de Salud</strong> y el <strong>Foro Virtual de Salud</strong>.',ev:'Ley 16/2003 Art. 67'},
{id:'p19',n:'19',sec:'p',q:'La clasificación NANDA-I agrupa los diagnósticos en:',opts:['Patrones de respuesta humana','Patrones funcionales de salud de Gordon','Campos y dominios','Dominios y clases'],ans:'D',exp:'Taxonomía NANDA-II (vigente): <strong>13 dominios y 47 clases</strong>. Los patrones de respuesta humana eran de Taxonomy I. Los patrones de Gordon son herramienta de valoración.',ev:'NANDA-I 2021-2023'},
{id:'p20',n:'20',sec:'p',q:'Las garantías de seguridad y calidad de la Ley 16/2003 son aplicables a:',opts:['Solamente a los centros públicos','Solamente a los centros privados','A todos los centros, públicos y privados, independientemente de la financiación','A todos los centros, públicos y privados, solo cuando realicen prestaciones de financiación pública'],ans:'C',exp:'Ley 16/2003 Art. 27: aplicable a <strong>todos los centros, públicos y privados</strong>, independientemente de la financiación.',ev:'Ley 16/2003 Art. 27'},
{id:'p21',n:'21',sec:'p',q:'Los acuerdos del Consejo Interterritorial del SNS (excepto convenios) se plasman a través de:',opts:['Resoluciones de obligado cumplimiento','Recomendaciones','Informes y Dictámenes','Programas de actuación'],ans:'B',exp:'Ley 16/2003 Art. 73: los acuerdos se plasman como <strong>recomendaciones</strong>, sin carácter vinculante para las CC.AA.',ev:'Ley 16/2003 Art. 73'},
{id:'p22',n:'22',sec:'p',q:'Cuanto mayor sea la dispersión de datos alrededor de la media, la desviación estándar será:',opts:['Menor','Igual','Indiferente','Mayor'],ans:'D',exp:'La desviación estándar mide dispersión respecto a la media: a <strong>mayor dispersión, mayor DE</strong>. Si todos los datos son iguales a la media, DE=0.',ev:'Estadística básica'},
{id:'p23',n:'23',sec:'p',q:'Según la LPRL 31/1995, la política en materia de prevención de riesgos laborales tendrá por objeto:',opts:['Promover la seguridad y la salud de los trabajadores','Establecer procedimientos para mejorar el bienestar de los trabajadores','La reducción de sanciones en materia de prevención','La disminución de las bajas laborales'],ans:'A',exp:'Art. 5 LPRL: la política de prevención tiene por objeto la <strong>promoción de la mejora de las condiciones de trabajo</strong> para elevar la protección de la seguridad y salud de los trabajadores.',ev:'LPRL Art. 5'},
{id:'p24',n:'24',sec:'p',q:'Según Hildegard E. Peplau, la relación enfermera-paciente evoluciona en cuatro fases en el siguiente orden:',opts:['Orientación, Identificación, Explotación, Resolución','Orientación, apoyo, actuación, enseñanza','Orientación, identificación explotación, resolución','Actuación, orientación, enseñanza, resolución'],ans:'A',exp:'Peplau (1952): <strong>1.Orientación → 2.Identificación → 3.Explotación → 4.Resolución</strong>. La opción C tiene el mismo contenido pero carece de coma entre identificación y explotación; A es la ortográficamente correcta.',ev:'Peplau HE. 1952'},
{id:'p25',n:'25',sec:'p',q:'Los dos elementos básicos que determinan si una fuente es primaria son:',opts:['Relación entre el tema y el sitio del evento','Relación entre el tema y tiempo transcurrido','Relación entre el tiempo y el lugar','Relación entre el autor y el tema'],ans:'D',exp:'Una fuente primaria proviene directamente del autor que vivió/investigó el fenómeno. Los elementos definitorios son la <strong>relación entre el autor y el tema</strong>.',ev:'Metodología investigación'},
{id:'p26',n:'26',sec:'p',q:'Una enfermera con contrato de interinidad como personal estatutario, ¿en cuál de estos casos sería cesada?',opts:['Pasados 6 meses','Si su plaza fuera amortizada','Si tiene una baja laboral','Si realiza una reducción de jornada por cuidado de hijo menor de tres años'],ans:'B',exp:'El interino cesa cuando se extingue o <strong>amortiza la plaza</strong> (desaparece del catálogo), se incorpora el titular, o desaparece la causa que motivó el nombramiento.',ev:'Ley 55/2003 Art. 9'},
{id:'p27',n:'27',sec:'p',q:'¿Cuál es el tipo de estudio que produce la evidencia más sólida para establecer relaciones causa-efecto?',opts:['Estudio transversal','Estudio de cohorte','Estudio de casos y controles','Ensayo clínico'],ans:'D',exp:'El <strong>Ensayo Clínico Aleatorizado (ECA)</strong> produce la evidencia más sólida para establecer causalidad. Jerarquía: ECA > cohorte > casos-controles > transversal.',ev:'Oxford CEBM; Jerarquía de la evidencia'},
{id:'p28',n:'28',sec:'p',q:'Las necesidades energéticas del anciano respecto a la edad adulta:',opts:['Disminuyen en un 50%','Aumentan en un 25%','Siguen siendo las mismas','Disminuyen en un 15%'],ans:'D',exp:'Las necesidades energéticas disminuyen aprox. <strong>10-15%</strong> por cada década a partir de los 50-60 años por reducción de masa muscular y actividad.',ev:'EFSA dietary reference values; DRI'},
{id:'p29',n:'29',sec:'p',q:'¿Cuál de los siguientes es un muestreo probabilístico?',opts:['Muestreo por cuotas','Muestreo voluntario','Muestreo específico','Muestreo estratificado'],ans:'D',exp:'El <strong>muestreo estratificado</strong> es probabilístico: divide la población en estratos y selecciona aleatoriamente de cada uno. Cuotas, voluntario y conveniencia son no probabilísticos.',ev:'Metodología investigación'},
{id:'p30',n:'30',sec:'p',q:'En los cuidados preoperatorios, los objetivos primarios de la entrevista con el paciente son los siguientes EXCEPTO:',opts:['Obtener información de la salud del paciente','Determinar las expectativas del paciente acerca de la cirugía y de la anestesia','Determinar si la cirugía debe realizarse como ingresado, ambulatoria o el mismo día del ingreso','Valorar el estado emocional del paciente y su preparación para la cirugía'],ans:'C',exp:'Determinar el <strong>tipo de ingreso</strong> (ambulatorio/hospitalizado) es una decisión médica/administrativa, no objetivo de la valoración enfermera preoperatoria.',ev:'Protocolos preoperatorios'},
{id:'p31',n:'31',sec:'p',q:'¿Quién considera la enfermedad como un proceso interpersonal y terapéutico?',opts:['Nancy Roper','Ida Jean Orlando','Hildegarde Peplau','Dorothy Johnson'],ans:'C',exp:'<strong>Hildegarde Peplau</strong> concibió la enfermedad como una experiencia interpersonal y el proceso enfermero como proceso terapéutico.',ev:'Peplau HE. 1952'},
{id:'p32',n:'32',sec:'p',q:'Los estudios de prevalencia también se pueden denominar:',opts:['Estudio de caso control','Estudios transversales','Estudios de correlación','Estudios clínicos'],ans:'B',exp:'Los estudios de prevalencia miden la proporción de casos en un momento dado → también llamados <strong>estudios transversales</strong> o de corte.',ev:'Epidemiología básica'},
{id:'p33',n:'33',sec:'p',q:'¿A qué ámbito sanitario va dirigido el estudio de evaluación de calidad "SENECA"?',opts:['A las Comunidades Autónomas','A los Hospitales del Sistema Nacional de Salud','A la Atención Primaria','Ninguna de las tres anteriores son correctas'],ans:'B',exp:'El Proyecto <strong>SENECA</strong> es un proyecto europeo de evaluación de la calidad de los cuidados enfermeros en <strong>hospitales</strong> del SNS.',ev:'Proyecto SENECA; MSPS'},
{id:'p34',n:'34',sec:'p',q:'¿Quién consiguió reducción de las tasas de mortalidad hospitalaria mediante estudios epidemiológicos a mediados del Siglo XIX?',opts:['Florence Nightingale','Avedis Donabedian','W. Edwards Deming','Joseph M. Juran'],ans:'A',exp:'<strong>Florence Nightingale</strong> aplicó métodos estadísticos (diagramas de área polar) durante la guerra de Crimea, reduciendo la mortalidad hospitalaria del 42% al 2%.',ev:'Historia de la Enfermería'},
{id:'p35',n:'35',sec:'p',q:'Joven sin recursos con halitosis, xerostomía e inflamación de encías. El diagnóstico NANDA a seleccionar sería:',opts:['Déficit de autocuidado','Incumplimiento del tratamiento','Trastorno de la imagen corporal','Deterioro de la mucosa oral'],ans:'D',exp:'Halitosis + xerostomía + inflamación gingival son características definitorias del NANDA <strong>00045 "Deterioro de la mucosa oral"</strong>.',ev:'NANDA-I 2021-2023 #00045'},
{id:'p36',n:'36',sec:'p',q:'¿Es necesario mejorar la Coordinación entre Atención Primaria y Atención Especializada?',opts:['No, son distintos niveles asistenciales','Con determinados pacientes de patologías crónicas sí','Sí, deben establecerse procesos asistenciales integrados y rutas asistenciales','Sí, únicamente con el alta hospitalaria'],ans:'C',exp:'La coordinación AP-AH es necesaria mediante <strong>procesos asistenciales integrados y rutas clínicas</strong> en todo el continuum asistencial.',ev:'Estrategia de Atención a Pacientes con Enfermedades Crónicas SNS'},
{id:'p37',n:'37',sec:'p',q:'Definición de diagnóstico enfermero según NANDA:',opts:['Una formulación de una conclusión resultante del reconocimiento analítico','Una frase o término conciso que resume un grupo de indicadores empíricos','La determinación de la naturaleza y extensión de los problemas del paciente','Un juicio clínico sobre las respuestas de un individuo, familia o comunidad a problemas de salud reales o potenciales'],ans:'D',exp:'NANDA-I: "El diagnóstico enfermero es un <strong>juicio clínico sobre las respuestas de un individuo, familia o comunidad</strong> a problemas de salud reales o potenciales/procesos vitales."',ev:'NANDA-I 2021-2023'},
{id:'p38',n:'38',sec:'p',q:'Los principios de la Bioética son:',opts:['Justicia, beneficencia y complacencia','Beneficencia, no maleficencia, justicia y equidad','Beneficencia, justicia, autonomía y derecho a la participación','Beneficencia, no maleficencia, justicia y autonomía'],ans:'D',exp:'Los 4 principios de Beauchamp y Childress (1979): <strong>Autonomía, No maleficencia, Beneficencia y Justicia</strong>.',ev:'Beauchamp TL, Childress JF. 8ª ed. 2019'},
{id:'p39',n:'39',sec:'p',obs:true,q:'Según datos INE del año 2016, ¿cuál fue la primera causa de muerte por grupo de enfermedades en España?',opts:['Enfermedades del sistema digestivo','Enfermedades del sistema circulatorio','Tumores','Trastornos mentales y del comportamiento'],ans:'B',exp:'<span class="obadge">DATO 2016</span> En 2016, la 1ª causa de muerte era las <strong>enfermedades circulatorias</strong> (INE).<br><span class="abadge">ACTUALIZACIÓN 2023</span> Según INE 2022, los <strong>tumores</strong> superaron a las enfermedades circulatorias como 1ª causa de muerte en España. La pregunta es correcta para los datos 2016 tal como pregunta.',ev:'INE 2016; INE 2022'},
{id:'p40',n:'40',sec:'p',q:'Se define la intervención de enfermería como:',opts:['Cualquier tratamiento, basado en el conocimiento y juicio clínico, que realiza un profesional de enfermería para favorecer los resultados esperados del paciente','Un estado, conducta o percepción variable de un paciente sensible a los resultados de enfermería','Juicio clínico sobre la respuesta de un individuo/familia/comunidad frente a procesos vitales','Todas son incorrectas'],ans:'A',exp:'Definición NIC: "Cualquier <strong>tratamiento basado en el conocimiento y juicio clínico</strong> que realiza el profesional de enfermería para favorecer resultados." La B define resultado NOC; la C define diagnóstico NANDA.',ev:'NIC. Clasificación de Intervenciones de Enfermería'},
{id:'p41',n:'41',sec:'p',obs:true,q:'Esperanza de vida al nacimiento según datos INE 2018 por sexo:',opts:['80.52 años en hombres y 85.89 años en mujeres','70.15 años en hombres y 75.20 años en mujeres','90.72 años en mujeres y 95.25 años en hombres','85.52 años en mujeres y 90.22 años en hombres'],ans:'A',exp:'<span class="obadge">DATO 2018</span> INE 2018: hombres 80.52 / mujeres 85.89 años.<br><span class="abadge">ACTUALIZACIÓN 2023</span> INE 2023: <strong>~80.8 hombres / 86.2 mujeres</strong>. España sigue entre los países con mayor EV de la UE.',ev:'INE 2018; INE 2023'},
{id:'p42',n:'42',sec:'p',q:'¿Cuál corresponde a la tasa de fecundidad?',opts:['Nacimientos / Población total × 1000','Mujeres edad fértil / Población total × 1000','Mujeres edad fértil / Nacimientos × 1000','Nacimientos / Mujeres en edad fértil × 1000'],ans:'D',exp:'Tasa de fecundidad = <strong>Nº nacimientos / Nº mujeres 15-49 años × 1000</strong>. La tasa de natalidad = nacimientos/población total×1000.',ev:'Demografía y estadísticas vitales'},
{id:'p43',n:'43',sec:'p',q:'¿Cuál de estas características NO corresponde a la fase preoperacional en el periodo preescolar según Piaget?',opts:['Pensamiento mágico','Pensamiento egocentrismo','Pensamiento dominado por la percepción','Pensamiento abstracto'],ans:'D',exp:'Etapa preoperacional (2-7 años): pensamiento mágico, egocentrismo, dominado por percepción. El <strong>pensamiento abstracto</strong> pertenece a operaciones formales (12+ años).',ev:'Piaget. Teoría del desarrollo cognitivo'},
{id:'p44',n:'44',sec:'p',q:'¿Qué escala evalúa las AIVD (Actividades Instrumentales de la Vida Diaria) en el anciano?',opts:['Índice de Katz','Escala de Lawton y Brody','Escala de incapacidad física de la Cruz Roja','Escala de Plutchik'],ans:'B',exp:'<strong>Escala de Lawton y Brody</strong> (1969): 8 AIVD (teléfono, compras, cocina, casa, ropa, transporte, medicación, economía). El Índice de Katz evalúa ABVD.',ev:'Lawton MP, Brody EM. 1969'},
{id:'p45',n:'45',sec:'p',q:'¿Qué fármaco corresponde al segundo eslabón de la escalera analgésica de la OMS?',opts:['Antiinflamatorio no esteroideo','Morfina','Metadona','Codeína'],ans:'D',exp:'Escalera OMS: 1º AINEs/paracetamol · <strong>2º Opioides débiles (codeína, tramadol)</strong> + AINEs · 3º Opioides fuertes (morfina, fentanilo). La morfina y metadona son 3er escalón.',ev:'OMS. Escalera analgésica'},
{id:'p46',n:'46',sec:'p',q:'En la prevención de infecciones urinarias nosocomiales, ¿cuál es una ineficacia comprobada según la OMS?',opts:['Técnica aséptica en la inserción','Uso de antiséptico en la bolsa de drenaje','Limitación del período de uso de la sonda','Mantenimiento del tubo de drenaje cerrado'],ans:'B',exp:'El <strong>uso de antiséptico en la bolsa de drenaje</strong> no ha demostrado eficacia para prevenir ITU-SC. Las medidas eficaces son: técnica aséptica, sistema cerrado, retirada precoz.',ev:'CDC Guidelines CAUTI 2009; OMS'},
{id:'p47',n:'47',sec:'p',q:'La creadora de la Teoría de la Adaptación y Teoría General de Sistemas es:',opts:['Callista Roy','Martha E. Rogers','Patricia Benner','Ida Orlando'],ans:'A',exp:'<strong>Callista Roy</strong> desarrolló el Modelo de Adaptación (1970): el ser humano como sistema adaptativo que responde a estímulos por 4 modos de adaptación.',ev:'Roy C. The Roy Adaptation Model. 1970'},
{id:'p48',n:'48',sec:'p',q:'La bacteria gramnegativo causante de infecciones nosocomiales transmitidas por el agua es:',opts:['Mycobacterium chelonae','Aeromonas hydrophilia','Mycobacterium avium intracellularis','Clostridium'],ans:'B',exp:'<strong>Aeromonas hydrophila</strong>: bacilo gramnegativo, anaerobio facultativo, habitante del agua dulce/salada. Causa infecciones nosocomiales en inmunodeprimidos por agua contaminada.',ev:'Microbiología clínica; ECDC'},
{id:'p49',n:'49',sec:'p',q:'¿Cuál es un método directo de Educación para la Salud?',opts:['Televisión','Carteles o murales','Folletos y publicaciones','La charla'],ans:'D',exp:'Métodos <strong>directos</strong>: contacto personal (charla, entrevista, sesión grupal). Métodos <strong>indirectos</strong>: sin contacto personal (TV, carteles, folletos, radio, internet).',ev:'EpS: metodología'},
{id:'p50',n:'50',sec:'p',q:'En paciente oncológico terminal, la vía de elección para la administración de fármacos será:',opts:['Subcutánea','Oral','Inhalatoria','Intravenosa'],ans:'B',exp:'La vía <strong>oral</strong> es de elección en cuidados paliativos siempre que sea posible. Cuando no se puede, la alternativa es la vía <strong>subcutánea</strong> (no la intramuscular).',ev:'OMS. Tratamiento del dolor en cáncer; SECPAL'},
// P51-100
{id:'p51',n:'51',sec:'p',q:'¿De qué modelo de aprendizaje en EpS son característicos los factores predisponentes, facilitadores y reforzantes?',opts:['Modelo de etapas de cambio','Modelo de Gagne','Modelo de etapas','PRECEDE-PROCEDE'],ans:'D',exp:'El modelo <strong>PRECEDE-PROCEDE</strong> (Green y Kreuter, 1991) distingue tres categorías de factores: predisponentes (actitudes, creencias), facilitadores (recursos, habilidades) y reforzantes (recompensas, apoyo social).',ev:'Green LW, Kreuter MW. Health Promotion Planning. 1991'},
{id:'p52',n:'52',sec:'p',q:'La inmunidad artificial pasiva es aquella que se consigue:',opts:['Al administrar una vacuna','Al padecer una enfermedad infectocontagiosa','Durante la gestación al transferir las inmunoglobulinas la madre al feto','Al administrar una gammaglobulina'],ans:'D',exp:'Inmunidad <strong>artificial pasiva</strong>: administración de <strong>anticuerpos ya formados</strong> (inmunoglobulinas/antisueros). Artificial activa=vacuna. Natural pasiva=paso de Ig maternas al feto. Natural activa=padecer la enfermedad.',ev:'Inmunología básica'},
{id:'p53',n:'53',sec:'p',q:'En un paciente con insuficiencia cardiaca, diabetes tipo 2 y dislipemia, ¿cuál de estos fármacos supone riesgo de empeoramiento de la IC?',opts:['Metformina','Dexketoprofeno','Furosemida','Cardivelol'],ans:'B',exp:'El <strong>dexketoprofeno (AINE)</strong> provoca retención de sodio y agua, reduce la eficacia de los diuréticos y puede descompensar la IC. Los AINEs están contraindicados en IC. La furosemida es diurético de asa, esencial en IC. El carvedilol (betabloqueante) está indicado en IC.',ev:'ESC Guidelines IC 2023'},
{id:'p54',n:'54',sec:'p',q:'¿Cuál de las siguientes características es propia de las vacunas inactivadas?',opts:['Confieren una protección de mayor duración','Posibilitan la difusión de la infección entre individuos no vacunados','Son más reactógenas','Requieren de varias dosis de primovacunación y refuerzo'],ans:'D',exp:'Las vacunas <strong>inactivadas</strong> requieren múltiples dosis de primovacunación y refuerzos (no generan respuesta inmune tan duradera como las atenuadas). Son menos reactógenas y no producen infección. Las atenuadas dan inmunidad más duradera con menos dosis.',ev:'Inmunología básica; calendario vacunal'},
{id:'p55',n:'55',sec:'p',q:'El tipo de intervención quirúrgica destinada a la corrección de un cistocele se denomina:',opts:['Laparotomía','Laparoscopia','Colporrafia','Perineorrafia'],ans:'C',exp:'La <strong>colporrafia anterior</strong> es la reparación quirúrgica de la pared vaginal anterior para corregir el cistocele (prolapso de vejiga). La colporrafia posterior corrige el rectocele.',ev:'Ginecología quirúrgica'},
{id:'p56',n:'56',sec:'p',q:'Según la Estrategia NAOS, en el desarrollo de hábitos alimentarios saludables, señale la respuesta correcta:',opts:['Los hidratos de carbono deben representar entre el 70% y el 80% de las calorías de la dieta','Se recomienda que las grasas no superen el 30% de la ingesta diaria, reduciendo grasas saturadas y ácidos grasos trans','Suprimir el consumo de productos ricos en azúcares simples','Beber más de tres litros de agua al día'],ans:'B',exp:'Estrategia NAOS/OMS: las <strong>grasas no deben superar el 30% de la ingesta total</strong>, con reducción de grasas saturadas (<10%) y ácidos grasos trans (<1%). Los HC deben ser 45-60%, no 70-80%. El agua recomendada es ~2L/día, no >3L.',ev:'Estrategia NAOS; OMS 2023'},
{id:'p57',n:'57',sec:'p',q:'¿Cuál de estas afirmaciones es FALSA respecto a los hábitos saludables en la infancia?',opts:['Los hábitos alimentarios y sedentarios se desarrollan en la infancia y son luego muy difíciles de modificar','La escuela ofrece oportunidades para formar a los niños sobre hábitos saludables','La influencia del ámbito familiar no es decisiva ya que los niños pasan mucho tiempo en la escuela','La escuela es uno de los lugares más eficaces para modificar los estilos de vida de los niños'],ans:'C',exp:'La afirmación FALSA es la C: la influencia familiar <strong>sí es decisiva</strong> en el desarrollo de comportamientos saludables. Los niños interiorizan valores y hábitos principalmente en el entorno familiar.',ev:'Estrategia NAOS; AEPAP'},
{id:'p58',n:'58',sec:'p',q:'¿Cuáles son las partes de la entrevista clínica?',opts:['Iniciación, cuerpo y cierre','Iniciación, costumbre y cierre','Iniciación, motivo y cuerpo','Preguntas, respuestas y forma'],ans:'A',exp:'Las tres partes de la entrevista clínica son: <strong>Iniciación</strong> (rapport, presentación), <strong>Cuerpo</strong> (desarrollo, recogida de información) y <strong>Cierre</strong> (resumen, plan de acción).',ev:'Comunicación clínica básica'},
{id:'p59',n:'59',sec:'p',q:'Un paciente consciente de sus problemas que ha decidido superarlos pero aún no ha decidido actuar, ¿en qué fase de Prochaska y DiClemente se encuentra?',opts:['Espera','Contemplación','Mantenimiento','Precontemplación'],ans:'B',exp:'Modelo Transteórico de Prochaska-DiClemente: <strong>Contemplación</strong> = la persona reconoce el problema y piensa en cambiarlo pero no se ha comprometido a actuar (ambivalencia). Precontemplación = no reconoce el problema.',ev:'Prochaska JO, DiClemente CC. 1983'},
{id:'p60',n:'60',sec:'p',q:'En cuanto a las recomendaciones en el cuidado del recién nacido, señale la respuesta correcta:',opts:['Respetar las preferencias de los padres','El lavado o aspiración gástrica son prácticas que aunque tienen riesgo, ofrecen ventajas y deben realizarse sistemáticamente','Para el test de Apgar al minuto y 5 min no es necesaria la separación del RN de su madre','Profilaxis oftálmica neonatal'],ans:'C',exp:'El test de Apgar puede y debe realizarse <strong>sin separar al RN de su madre</strong>, en contacto piel con piel. El lavado/aspiración gástrica rutinaria NO está recomendado. La profilaxis oftálmica es práctica específica, no la recomendación más correcta del enunciado.',ev:'OMS; SEGO; Protocolos SEGO 2022'},
{id:'p61',n:'61',sec:'p',q:'RN con FC <100 lpm. Tras ventilación con mascarilla 30 seg sin mejoría, ¿qué está indicado?',opts:['Estimulación física para que recupere la FC','Intubar al bebé si se comprueba que la ventilación previa fue técnicamente correcta','Aplicar O₂ mediante CPAP','Continuar ventilación con mascarilla mínimo 60 segundos'],ans:'B',exp:'Algoritmo neonatal (ERC 2021): si tras 30 seg de VPP correcta no mejora la FC → <strong>intubación endotraqueal</strong> (o mascarilla laríngea). Si la técnica fue correcta y no responde, el siguiente paso es asegurar vía aérea definitiva.',ev:'ERC Resuscitation Guidelines 2021; ILCOR'},
{id:'p62',n:'62',sec:'p',q:'En la deshidratación hipernatrémica del neonato, indique el factor FALSO del cuadro clínico:',opts:['Existencia de fiebre e ictericia','Llanto inconsolable, exageración del tono muscular y los reflejos','Alteraciones del estado de conciencia y convulsiones','Alimentación no materna'],ans:'D',exp:'La deshidratación hipernatrémica neonatal se asocia a <strong>lactancia materna</strong> con ingesta insuficiente (no a alimentación no materna). Los demás síntomas (fiebre, ictericia, hipertonía, convulsiones) sí son del cuadro clínico.',ev:'Pediatría neonatal'},
{id:'p63',n:'63',sec:'p',q:'¿Qué parámetros son característicos en el recién nacido prematuro?',opts:['Cráneo blando, escaso panículo adiposo y transparencia venosa','Predominio de flexión en el tono muscular y presencia de panículo adiposo','Presencia de cartílago y pezón definido','Predominio de extensión en el tono muscular y piel sonrosada'],ans:'A',exp:'El RN prematuro se caracteriza por: <strong>cráneo blando</strong> (fontanelas amplias), <strong>escaso panículo adiposo</strong>, transparencia venosa (piel fina). Predominio de extensión en el tono (no flexión). Escaso cartílago auricular.',ev:'Neonatología. Protocolos SEGO'},
{id:'p64',n:'64',sec:'p',q:'¿En dónde se encuentran los tubérculos de Montgomery?',opts:['En el cérvix','En los ovarios','En el fondus del cuerpo del útero','En las areolas de las mamas'],ans:'D',exp:'Los <strong>tubérculos de Montgomery</strong> son glándulas sebáceas modificadas que se encuentran en las <strong>areolas mamarias</strong>. Se hipertrofian durante el embarazo y producen una secreción oleosa que lubrica la areola y el pezón.',ev:'Anatomía mamaria'},
{id:'p65',n:'65',sec:'p',q:'De las siguientes ETS, ¿cuál está causada por un parásito?',opts:['Tricomoniasis','Clamidia','Sífilis','Gonorrea'],ans:'A',exp:'La <strong>tricomoniasis</strong> está causada por Trichomonas vaginalis, un protozoo (parásito unicelular). Clamidia = bacteria (Chlamydia trachomatis). Sífilis = bacteria (Treponema pallidum). Gonorrea = bacteria (Neisseria gonorrhoeae).',ev:'ETS básico; ECDC'},
{id:'p66',n:'66',sec:'p',q:'Según la OMS, ¿qué rango de edad comprende la adolescencia?',opts:['De 10-19 años','De 14-20 años','De 20-30 años','De 8-19 años'],ans:'A',exp:'OMS: la adolescencia comprende <strong>10-19 años</strong>. La juventud: 15-24 años. La persona joven: 10-24 años. La pubertad puede comenzar antes (8-9 años) pero la adolescencia OMS es 10-19.',ev:'OMS Adolescencia'},
{id:'p67',n:'67',sec:'p',q:'¿Qué detecta el Test de O\'Sullivan en el embarazo?',opts:['Una posible diabetes gestacional','La detección del estreptococo agalactiae','Si existe uno o más embriones (gemelos, mellizos)','Posibles malformaciones fetales'],ans:'A',exp:'El <strong>Test de O\'Sullivan</strong> es la prueba de cribado de la <strong>diabetes gestacional</strong>: glucemia 1h tras administrar 50g de glucosa oral. Si ≥140 mg/dl requiere confirmación con SOG 100g.',ev:'SEGO; Protocolo diabetes gestacional'},
{id:'p68',n:'68',sec:'p',q:'Densitometría DXA en mujer de 58 años: T-score de -2.1 DE. Según criterios OMS 1994 presenta:',opts:['Osteopenia','Osteoporosis grave','Osteoporosis','Normalidad'],ans:'A',exp:'Criterios OMS DXA: Normal ≥-1. <strong>Osteopenia: -1 a -2.5. Osteoporosis: ≤-2.5</strong>. Osteoporosis establecida/grave: ≤-2.5 con fractura. T-score de -2.1 → osteopenia.',ev:'OMS 1994; IOF'},
{id:'p69',n:'69',sec:'p',q:'Los fármacos no clasificados como analgésicos que se usan en la escalera OMS para el control del dolor se conocen como:',opts:['Antagonistas','Coadyuvantes','Nocebos','Secundarios'],ans:'B',exp:'Los <strong>coadyuvantes</strong> (o adyuvantes, co-analgésicos) son fármacos que no son analgésicos primarios pero potencian la analgesia o tratan síntomas asociados (antidepresivos, anticonvulsivantes, corticoides, bifosfonatos).',ev:'OMS; Escalera analgésica'},
{id:'p70',n:'70',sec:'p',q:'Durante la menopausia, la FSH estará:',opts:['Disminuida','Aumentada','No presenta modificación','La FSH se encuentra suprimida por inhibición competitiva con la LH'],ans:'B',exp:'En la menopausia, el ovario deja de producir estrógenos → falla el feed-back negativo sobre el hipotálamo/hipófisis → <strong>elevación compensatoria de FSH y LH</strong> (FSH >40 mUI/ml criterio diagnóstico).',ev:'Endocrinología reproductiva'},
{id:'p71',n:'71',sec:'p',q:'¿Qué test se utiliza para detectar la depresión en el paciente anciano en la esfera afectiva?',opts:['Cuestionario abreviado de estado mental de Pfeiffer','Mini Examen Cognoscitivo de Lobo (MEC)','Escala de Incapacidad Mental de la Cruz Roja','Test de Yesavage'],ans:'D',exp:'El <strong>Test de Yesavage</strong> (GDS - Geriatric Depression Scale) evalúa depresión en el anciano. Pfeiffer y MEC evalúan función cognitiva. La escala de la Cruz Roja valora incapacidad.',ev:'Yesavage JA et al. 1982'},
{id:'p72',n:'72',sec:'p',q:'¿Qué es la escala de Trauma Score Revisado (RTS)?',opts:['Una medición combinada de la escala de Glasgow, tensión arterial sistólica y la frecuencia cardiaca','Una medición que utiliza los Patrones funcionales de Marjory Gordon','Una medición que asigna un nivel de gravedad entre el 1 y el 6 a cada lesión traumática','Una medición sobre el nivel de gravedad de la lesión traumática, combinada con los valores de TA y FC'],ans:'A',exp:'El <strong>Revised Trauma Score (RTS)</strong> combina 3 parámetros: <strong>Glasgow Coma Scale + TA sistólica + frecuencia respiratoria</strong>. Cada uno se puntúa 0-4. Mayor puntuación = menor gravedad. La escala AIS asigna 1-6 a lesiones.',ev:'Champion HR et al. J Trauma 1989'},
{id:'p73',n:'73',sec:'p',q:'En intoxicación aguda de opiáceos, el antídoto específico es:',opts:['Flumazenilo','Tiamina','Piridoxina','Naloxona'],ans:'D',exp:'<strong>Naloxona</strong> es el antídoto específico de los opiáceos (antagonista competitivo de los receptores opioides). Flumazenilo = antídoto benzodiazepinas. Tiamina = déficit vitamina B1. Piridoxina = déficit B6/intox. isoniacida.',ev:'Toxicología clínica; SEMES'},
{id:'p74',n:'74',sec:'p',q:'En un individuo correctamente vacunado contra hepatitis B, ¿qué marcador serológico observaremos?',opts:['HBsAg positivo','HBeAg positivo','Anti-HBc positivo','Anti-HBs positivo'],ans:'D',exp:'Vacunación correcta contra VHB → solo produce <strong>Anti-HBs positivo</strong> (anticuerpos protectores contra el antígeno de superficie). El Anti-HBc indica infección natural (no vacunación). HBsAg y HBeAg indican infección activa.',ev:'Hepatología; calendario vacunal'},
{id:'p75',n:'75',sec:'p',q:'En un RN de madre con HBsAg positivo:',opts:['Es necesario vacunarle de hepatitis B y administrarle inmunoglobulina en las 12 horas posteriores al parto','No es necesario vacunarle ya que tiene anticuerpos de la madre','Solo administrar inmunoglobulina en la primera semana de vida','Solo se administrará la vacuna según el calendario vacunal'],ans:'A',exp:'Protocolo estándar: RN de madre HBsAg(+) → <strong>vacuna VHB + inmunoglobulina específica (IGHB)</strong> en las primeras <strong>12 horas</strong>. Eficacia preventiva >90%.',ev:'SEGO; Comité Vacunas AEP; Protocolo IGHB 2023'},
{id:'p76',n:'76',sec:'p',q:'Según las Recomendaciones ERC 2015, la primera actuación ante una víctima en que se sospecha PCR será:',opts:['Iniciar compresiones torácicas inmediatamente','Asegurar nuestra seguridad y la de la víctima','Comprobar si respira','Abrir la vía aérea mediante la maniobra frente-mentón'],ans:'B',exp:'ERC 2015 (y 2021): la <strong>primera acción es siempre garantizar la seguridad</strong> de la escena (rescatador y víctima). Solo después: comprobar respuesta → pedir ayuda → abrir vía aérea → valorar respiración.',ev:'ERC Guidelines 2015; ERC 2021'},
{id:'p77',n:'77',sec:'p',q:'¿Qué maniobra está indicada para la apertura de vía aérea en un niño de 7 meses con PCR por intoxicación de CO?',opts:['En menores de 1 año no es necesaria ninguna maniobra adicional','Hiperextensión completa del cuello','Maniobra frente-mentón','Introducir dos dedos en la boca barriendo para extraer posibles cuerpos extraños'],ans:'C',exp:'En lactantes y niños la maniobra de elección para apertura de vía aérea (sin sospecha de trauma cervical) es la <strong>maniobra frente-mentón</strong>. En <1 año se realiza con extensión <strong>neutra</strong> del cuello (no hiperextensión ni neutra absoluta). La causa es CO, no cuerpo extraño.',ev:'ERC Guidelines 2021; Pediatric BLS'},
{id:'p78',n:'78',sec:'p',q:'Según ERC 2015, en manejo de OVACE en pediatría, indique la respuesta INCORRECTA:',opts:['Si puede toser de manera efectiva, anime a seguir tosiendo','Si no puede toser pero está consciente, dé golpes en espalda y realice maniobras compresivas','En lactantes son más efectivas anatómicamente las compresiones abdominales','Si está inconsciente, abra vía aérea, ventile 5 veces e inicie RCP'],ans:'C',exp:'La respuesta INCORRECTA es C: en <strong>lactantes están contraindicadas las compresiones abdominales</strong> (riesgo de daño hepático). En lactantes se usan <strong>5 golpes interescapulares + 5 compresiones torácicas</strong>. Las abdominales (Heimlich) son para niños >1 año.',ev:'ERC Guidelines 2021; Pediatric FBAO'},
{id:'p79',n:'79',sec:'p',q:'¿Cuál de los siguientes antibióticos NO se utiliza en el tratamiento inicial de la tuberculosis?',opts:['Etambutol','Isoniacida','Vancomicina','Piracinamida'],ans:'C',exp:'Pauta inicial TBC (2 meses): <strong>RHZE</strong> = Rifampicina + Isoniacida + Pirazinamida + Etambutol. Luego 4 meses de RH. La <strong>vancomicina</strong> es un glucopéptido activo frente a grampositivos, sin actividad frente a Mycobacterium tuberculosis.',ev:'SEPAR; OMS. Tratamiento TBC 2022'},
{id:'p80',n:'80',sec:'p',q:'Según la escala de Braden para úlceras por presión, ¿qué puntuación tendría una persona con ALTO riesgo de UPP?',opts:['<12 puntos','13-14 puntos','15-16 puntos','15-18 puntos'],ans:'A',exp:'Escala de Braden (rango 6-23): <strong>Alto riesgo: ≤12</strong>. Riesgo moderado: 13-14. Bajo riesgo: 15-18. Sin riesgo: 19-23. (Algunos protocolos también usan ≤16 como punto de corte para iniciar medidas preventivas.)',ev:'Braden B, Bergstrom N. 1987; GNEAUPP'},
{id:'p81',n:'81',sec:'p',q:'La puntuación más baja y más alta de la escala de Glasgow es:',opts:['De 2 la más baja y la más alta 15','De 3 la más baja y la más alta de 15','De 4 la más baja y la más alta 16','De 3 la más baja y la más alta 16'],ans:'B',exp:'La Escala de Coma de Glasgow: apertura ocular (1-4), respuesta verbal (1-5), respuesta motora (1-6). <strong>Mínimo = 3 (sin respuesta en las tres), Máximo = 15</strong>. El valor mínimo NO es 1 porque cada subescala tiene mínimo 1.',ev:'Teasdale G, Jennett B. Lancet 1974'},
{id:'p82',n:'82',sec:'p',q:'En gasometría arterial en una crisis asmática en estadio leve se puede encontrar:',opts:['Hipoxemia e hipercapnia','Hipocapnia y alcalosis respiratoria','Acidosis metabólica y respiratoria','Hiperoxemia y alcalosis metabólica'],ans:'B',exp:'Crisis asmática leve: hiperventilación compensatoria → <strong>hipocapnia + alcalosis respiratoria</strong> (pH↑, pCO2↓) con leve hipoxemia. Hipercapnia (pCO2↑) indica crisis grave/fallo ventilatorio.',ev:'GEMA 5.3; Fisiopatología asma'},
{id:'p83',n:'83',sec:'p',q:'El bromuro de ipratropio es un medicamento indicado en broncoespasmo cuya acción farmacológica es:',opts:['Anticolinérgica','Beta adrenérgica','Colinérgica','Alfa adrenérgica'],ans:'A',exp:'El <strong>bromuro de ipratropio</strong> es un broncodilatador <strong>anticolinérgico</strong> (antimuscarínico M1, M2, M3), bloquea los receptores muscarínicos en el músculo liso bronquial. Usado en EPOC y asma de rescate.',ev:'GOLD 2025; Farmacología'},
{id:'p84',n:'84',sec:'p',q:'¿Qué tipo de patología es muy frecuente en ancianos por la dilatación auricular?',opts:['Flutter auricular','Bloqueo auriculo ventricular','Torsade de pointes','Fibrilación auricular'],ans:'D',exp:'La <strong>fibrilación auricular (FA)</strong> es la arritmia sostenida más frecuente, con prevalencia muy aumentada en ancianos. Se asocia a dilatación auricular por HTA, IC, cardiopatía valvular. Prevalencia ~9% en >80 años.',ev:'ESC Guidelines FA 2023'},
{id:'p85',n:'85',sec:'p',q:'Dentro de la clasificación TNM, ¿qué indicaría T1N0M0?',opts:['No existe evidencia de tumor primario','Existe afectación de los ganglios regionales','Hay metástasis a distancia','No hay metástasis a distancia'],ans:'D',exp:'TNM: T1=tumor pequeño localizado. N0=<strong>sin afectación ganglionar</strong>. M0=<strong>sin metástasis a distancia</strong>. La opción correcta es D (M0=sin metástasis). T0=sin evidencia tumor primario. N1-3=ganglios afectados. M1=metástasis.',ev:'AJCC Cancer Staging 8ª ed.'},
{id:'p86',n:'86',sec:'p',q:'¿Cuál es el medicamento que NO se utiliza para el tratamiento de una crisis hipertensiva?',opts:['Capoten','Piroxicam','Furosemida','Hidralacina'],ans:'B',exp:'El <strong>piroxicam (AINE)</strong> no se usa en crisis hipertensiva; de hecho, puede elevar la TA. Los AINEs son contraindicados en urgencias hipertensivas. Capoten (captopril), furosemida e hidralacina sí se usan.',ev:'ESC/ESH Guidelines HTA 2023'},
{id:'p87',n:'87',sec:'p',q:'¿Cuál es la causa principal de la insuficiencia renal crónica?',opts:['Glomerulonefritis','Pielonefritis crónica','Nefroangiesclerosis','Enfermedades vasculo-intestinales'],ans:'C',exp:'<span class="abadge">ACTUALIZACIÓN</span> La causa más frecuente de IRC en España y países desarrollados es la <strong>nefropatía diabética</strong> (~25-30%), seguida de <strong>nefroangiosclerosis hipertensiva</strong> (~25%). En 2019 la pregunta tenía como respuesta C (nefroangiosclerosis), lo que sigue siendo correcto en ausencia de "diabetes" como opción.',ev:'KDIGO CKD 2024; SEDYT; Registro ERA-EDTA'},
{id:'p88',n:'88',sec:'p',q:'¿Cuál es el mecanismo de acción de las sulfonilureas (Daonil®, Euglucon®) en DM tipo 2?',opts:['Aumento de la captación de glucosa en la célula muscular','Aumento de la secreción de insulina','Reducción de la producción hepática de glucosa','Reducción de la absorción de hidratos de carbono complejos'],ans:'B',exp:'Las <strong>sulfonilureas</strong> actúan sobre los canales K⁺-ATP de las células beta pancreáticas, provocando <strong>aumento de la secreción de insulina</strong>. Metformina = reduce producción hepática glucosa. Acarbosa = inhibe absorción HC.',ev:'ADA Standards of Care 2026'},
{id:'p89',n:'89',sec:'p',q:'¿Qué herramienta utilizaremos para valorar el pie diabético?',opts:['Clasificación de Wagner','Escala de valoración de Pittsburgh','Índice de Semmes-Weinstein','Índice de Pfeiffer'],ans:'A',exp:'La <strong>Clasificación de Wagner</strong> (0-5) es la escala estándar de valoración y estadificación del pie diabético. El monofilamento de Semmes-Weinstein evalúa la sensibilidad táctil, no clasifica el pie diabético.',ev:'ADA Standards of Care 2026; IWGDF Guidelines 2023'},
{id:'p90',n:'90',sec:'p',q:'Utilizando metodología enfermera, el diagnóstico "Dolor Agudo" ¿a qué dominio pertenece?',opts:['Confort','Afrontamiento/tolerancia al estrés','Principios vitales','Autopercepción'],ans:'A',exp:'NANDA-I: el diagnóstico <strong>00132 "Dolor Agudo"</strong> pertenece al <strong>Dominio 12: Confort</strong>, Clase 1: Confort físico.',ev:'NANDA-I 2021-2023 #00132'},
{id:'p91',n:'91',sec:'p',q:'Señale la prueba clásica para el diagnóstico de lesión del ligamento cruzado:',opts:['Maniobra de Moragas','Cajón anterior','Test de McMurray','Test de estrés en varo'],ans:'B',exp:'El <strong>cajón anterior</strong> evalúa el ligamento cruzado anterior (LCA): con rodilla a 90° se tracciona la tibia hacia delante. Positivo si hay desplazamiento anterior >5mm. McMurray = meniscos. Test de estrés en varo = ligamento colateral externo.',ev:'Traumatología básica'},
{id:'p92',n:'92',sec:'p',q:'Un desgarro tendinoso presenta:',opts:['Edema y dolor local, incapacidad para mover la parte lesionada','Lenta tumefacción','Tras 48 horas equimosis local','Rigidez y pérdida de la función articular'],ans:'A',exp:'El <strong>desgarro tendinoso</strong> (rotura parcial o total) se presenta con: <strong>dolor agudo localizado, tumefacción inmediata, incapacidad funcional</strong>. La equimosis aparece tardíamente (horas-días), no es el hallazgo principal.',ev:'Traumatología básica'},
{id:'p93',n:'93',sec:'p',q:'¿Cuál es el síntoma más frecuente en la presentación del Cáncer de Colon?',opts:['Dolor Abdominal','Distensión Abdominal','Ascitis Abdominal','Hemorragia Rectal'],ans:'D',exp:'La <strong>hemorragia rectal/rectorragia</strong> (sangre en heces) es el síntoma más frecuente y el que más consultas genera por sospecha de CCR. El dolor abdominal también es frecuente pero menos específico.',ev:'ESMO CCR 2023; Guías SNS cribado CCR'},
{id:'p94',n:'94',sec:'p',q:'La presbiacusia se caracteriza por:',opts:['La neoformación del tejido esponjoso en el estribo','La disminución de la agudeza auditiva para los sonidos de baja frecuencia','La atrofia del órgano de Corti','La disminución de la agudeza auditiva para los sonidos de alta frecuencia'],ans:'D',exp:'La <strong>presbiacusia</strong> (hipoacusia del envejecimiento) se caracteriza por pérdida bilateral y simétrica de frecuencias <strong>altas</strong> (agudas) primero. La neoformación de tejido esponjoso en el estribo describe la otosclerosis.',ev:'Otología clínica'},
{id:'p95',n:'95',sec:'p',q:'La prueba que compara la audición por vía ósea con la vía aérea se denomina:',opts:['Prueba de Weber','Prueba de Rinne','Prueba de Babinski','Prueba de Dix-Hallpike'],ans:'B',exp:'<strong>Prueba de Rinne</strong>: diapasón en mastoides (vía ósea) y luego frente al oído (vía aérea). Normal: VA>VO. Rinne negativo (VO>VA) = hipoacusia conductiva. Weber = lateralización. Dix-Hallpike = VPPB.',ev:'Otología clínica'},
{id:'p96',n:'96',sec:'p',q:'Adulto con discapacidad por problema de salud mental que prefiere estar solo, se siente inseguro con otras personas. Etiqueta diagnóstica:',opts:['Aislamiento social','Deterioro de la interacción social','Afrontamiento inefectivo','No se trata de un diagnóstico de enfermería'],ans:'A',exp:'NANDA <strong>00053 "Aislamiento social"</strong>: sentirse solo impuesto por otros o por uno mismo, percepción negativa de la situación. El deterioro de la interacción social implica dificultades en el intercambio pero no el rechazo/preferencia de la soledad.',ev:'NANDA-I 2021-2023 #00053'},
{id:'p97',n:'97',sec:'p',q:'Se denomina reacción adversa de un fármaco a la reacción nociva o no deseada que:',opts:['Se produce siempre que el fármaco posea un índice terapéutico alto','No depende del estado fisiológico del paciente','Se manifiesta a las pocas horas de la administración del fármaco','Se presenta normalmente con dosis terapéuticas'],ans:'D',exp:'La RAM (Reacción Adversa a Medicamento) se define como una respuesta nociva y no intencionada que ocurre a <strong>dosis normales/terapéuticas</strong>. No incluye sobredosis ni errores de medicación. El estado fisiológico sí influye.',ev:'OMS; Directiva 2010/84/UE'},
{id:'p98',n:'98',sec:'p',q:'Para administrar 1000 ml de suero fisiológico en 24 horas, la velocidad de perfusión en gotas/minuto será:',opts:['42 gotas/minuto','14 gotas/minuto','20 gotas/minuto','25 gotas/minuto'],ans:'B',exp:'Cálculo: (1000 ml × 20 gotas/ml) / (24h × 60 min) = 20.000/1440 = <strong>13.88 ≈ 14 gotas/min</strong>. Usando factor de goteo estándar (20 gotas/ml). Si se usa microgotas (60 gotas/ml) serían 42 microgotas/min.',ev:'Cálculo de perfusiones'},
{id:'p99',n:'99',sec:'p',q:'¿Qué es el Grupo Funcional Homogéneo (GFH) en la gestión analítica hospitalaria (proyecto SIGNO)?',opts:['Son unidades clínicas mínimas que atienden una patología similar','Son unidades mínimas de gestión que se caracterizan por tener una actividad homogénea','Son procesos clínicos diferentes que tienen un coste igual','Son el nivel mínimo de estructuración de un hospital'],ans:'B',exp:'El <strong>GFH</strong> es la unidad mínima de gestión en la contabilidad analítica hospitalaria, con actividad homogénea, responsable del consumo de recursos. Es la base del sistema SIGNO (Sistema de Gestión de Costes hospitalarios).',ev:'Proyecto SIGNO; MSPS'},
{id:'p100',n:'100',sec:'p',q:'La eficiencia en la investigación clínica puede definirse como:',opts:['El grado en que una intervención origina un resultado beneficioso en condiciones ideales','El impacto sobre la salud de una acción en las mejores condiciones posibles','Los efectos alcanzados con una intervención en relación al esfuerzo empleado en términos de recursos, tiempo y coste','El impacto sobre la salud alcanzado en condiciones de práctica habitual'],ans:'C',exp:'<strong>Eficiencia</strong>: relación entre resultados obtenidos y recursos empleados. A: define eficacia. B: define eficacia en condiciones ideales. D: define efectividad.',ev:'Investigación clínica: definiciones'},
// RESERVA
{id:'r101',n:'R101',sec:'reserva',q:'La taxonomía NIC actualizada en 2018 contiene:',opts:['7 dominios, 30 clases y 554 intervenciones','13 dominios, 32 clases y 490 intervenciones','7 dominios, 30 clases y 565 intervenciones','7 dominios, 34 clases y 540 intervenciones'],ans:'C',exp:'NIC edición 2018 (7ª ed.): <strong>7 dominios, 30 clases y 565 intervenciones</strong>. La edición 2013 tenía 554 intervenciones. En 2021 (8ª ed.) se actualiza con 565 intervenciones.',ev:'NIC 2018; Bulechek et al. Elsevier'},
{id:'r102',n:'R102',sec:'reserva',q:'¿Qué son los Grupos Relacionados por el Diagnóstico (GRD)?',opts:['Son grupos de pacientes con similar patología','Son grupos de pacientes con patologías similares relacionadas con las pruebas realizadas','Es un sistema de clasificación de pacientes que relaciona los distintos tipos de pacientes tratados con el coste de su asistencia','Es un sistema de clasificación de pacientes con diagnóstico igual relacionado con el coste de las pruebas'],ans:'C',exp:'Los <strong>GRD</strong> son un sistema de clasificación de pacientes que permite relacionar los tipos de pacientes tratados en un hospital con el coste que representa su asistencia. Son la base de la financiación por proceso.',ev:'MSPS; Sistema GRD'},
{id:'r103',n:'R103',sec:'reserva',q:'A un paciente diabético obeso de 55 años que va a ser intervenido con anestesia general, ¿qué antidiabético sería el correcto?',opts:['Glibenclamida','Insulina','Metformina','Acarbosa'],ans:'B',exp:'Perioperatorio en DM: los antidiabéticos orales deben <strong>suspenderse antes de la cirugía</strong> (especialmente metformina por riesgo de acidosis láctica). El control glucémico perioperatorio se realiza con <strong>insulina</strong> de acción rápida ajustada según glucemia.',ev:'ADA Standards of Care 2026; Consenso perioperatorio DM'},
{id:'r104',n:'R104',sec:'reserva',q:'¿Cuál es la medida adecuada para prevenir la aspiración en pacientes con Nutrición Enteral?',opts:['Utilizar solo alimentos a temperatura ambiente','Administrar solamente a pacientes portadores de Sonda Sengstaken-Blakemore','Colocar al paciente en posición Semi-Fowler','Colocar al paciente en posición Trendelemburg'],ans:'C',exp:'La <strong>posición Semi-Fowler</strong> (cabecero elevado 30-45°) es la medida principal para prevenir la aspiración en pacientes con nutrición enteral. El Trendelenburg está contraindicado (aumenta riesgo). La temperatura y el tipo de sonda no previenen la aspiración.',ev:'ESPEN Guidelines EN 2023'},
{id:'r105',n:'R105',sec:'reserva',q:'¿Cuál de estas afirmaciones NO es cierta en cuanto a la formación continuada?',opts:['Proceso de enseñanza y aprendizaje activo y permanente al que tienen derecho y obligación los profesionales sanitarios','Se trata de continuar adquiriendo y actualizando competencias profesionales','Una buena formación continua es la mayor garantía para la conservación o mejora de un buen puesto de trabajo','Será responsabilidad de la enfermera actualizar conocimientos, por lo que debe realizarse en los periodos en que no se trabaje'],ans:'D',exp:'La afirmación FALSA es D: la formación continuada <strong>no debe limitarse a periodos fuera del trabajo</strong>. Debe integrarse en la práctica profesional y las instituciones tienen obligación de facilitarla. La Ley 44/2003 reconoce el derecho y la obligación de formación continuada.',ev:'Ley 44/2003 de Ordenación de Profesiones Sanitarias'},
{id:'r106',n:'R106',sec:'reserva',q:'Uno de los inconvenientes del trabajo en equipo es:',opts:['Mayor potencial para afrontar con éxito tareas complejas','Potencia el conformismo y la reducción de juicios críticos de algunos miembros frente a la mayoría','Mayor potencial para afrontar con éxito tareas interdependientes','Mayor volumen de información, conocimientos y habilidades'],ans:'B',exp:'El <strong>pensamiento grupal (groupthink)</strong> o conformismo es un inconveniente del trabajo en equipo: los miembros pueden suprimir su juicio crítico para mantener la cohesión grupal. Las opciones A, C, D son ventajas del trabajo en equipo.',ev:'Psicología organizacional; Janis IL 1972'},
{id:'r107',n:'R107',sec:'reserva',q:'¿Cuál de los siguientes métodos anticonceptivos NO es un método de barrera?',opts:['Preservativo masculino','Preservativo femenino','Diafragma','Parche transdérmico'],ans:'D',exp:'El <strong>parche transdérmico</strong> es un método anticonceptivo hormonal (libera etonogestrel+etinilestradiol a través de la piel), no es un método de barrera. Los métodos de barrera físicamente impiden el paso del esperma.',ev:'Anticoncepción; SEGO'},
{id:'r108',n:'R108',sec:'reserva',q:'La definición de Salud según la OMS:',opts:['Es un estado de completo bienestar físico, mental y social y no solamente la ausencia de enfermedad','Es la consecución de un nivel de salud que permita llevar a todas las personas una vida sola y económicamente productiva','Es la ciencia y el arte de promover la salud, prevenir la enfermedad y prolongar la vida','Es el proceso que permite a las personas incrementar su bienestar y el control sobre su salud'],ans:'A',exp:'OMS (1948, Carta Magna): "La salud es un estado de <strong>completo bienestar físico, mental y social</strong>, y no solamente la ausencia de afecciones o enfermedades." La opción D define Promoción de Salud (Carta de Ottawa 1986).',ev:'OMS. Preámbulo de la Constitución de la OMS 1948'},
{id:'r109',n:'R109',sec:'reserva',q:'Según art. 23 LO 1/2004 de violencia de género, las situaciones de violencia que dan lugar a derechos laborales se acreditarán mediante:',opts:['Cualquier documento que refleje la existencia de violencia de género','El informe médico que se entrega en Centros Hospitalarios','Es una situación especialmente protegida y la declaración de la interesada es suficiente','La orden de protección a favor de la víctima, y excepcionalmente el informe del Ministerio Fiscal'],ans:'D',exp:'Art. 23 LO 1/2004: la acreditación se realiza mediante la <strong>orden de protección</strong> a favor de la víctima; excepcionalmente, mediante el <strong>informe del Ministerio Fiscal</strong>. Esto fue modificado por la LO 1/2021 para admitir también otros medios de prueba.',ev:'LO 1/2004 Art. 23; LO 1/2021'},
{id:'r110',n:'R110',sec:'reserva',q:'La clasificación de Fabricio de Hilden en relación a las quemaduras se basa en:',opts:['La extensión','La localización','La profundidad','Por la gravedad de la lesión'],ans:'C',exp:'La clasificación de Fabricio de Hilden clasifica las quemaduras según la <strong>profundidad</strong> (epidérmica, dérmica superficial, dérmica profunda, subdérmica). La regla de los 9 o de Wallace clasifica por extensión.',ev:'Quemaduras: clasificación'},
// SP1
{id:'sp1_1',n:'SP1-1',sec:'sp1',q:'[Manuela, 73 años. Cáncer colon con metástasis hepáticas, quimioterapia paliativa. EPOC, HTA, DM tipo 2 insulin.]\n\nEn la escalera analgésica de la OMS, ¿desde qué escalón se pueden pautar los opiáceos?',opts:['Segundo','Primero','Tercero','Cuarto'],ans:'A',exp:'Los opiáceos débiles (codeína, tramadol) se pautar desde el <strong>2º escalón</strong>. Los opiáceos fuertes desde el 3er escalón. No existe 4º escalón en la escalera clásica de la OMS.',ev:'OMS. Escalera analgésica'},
{id:'sp1_2',n:'SP1-2',sec:'sp1',q:'[Manuela - morphine case]\n\nEn relación con la morfina, señale cuál de las siguientes afirmaciones es INCORRECTA:',opts:['Analgésico de elección en dolor crónico por cáncer','Si el paciente no puede tomar morfina oral, la alternativa preferente es la vía intramuscular profunda','Siempre que sea posible usar la vía oral','Para pasar de morfina oral liberación rápida a forma retard, administrar la misma dosis total diaria dividida en 2 tomas'],ans:'B',exp:'La afirmación INCORRECTA es B: cuando no se puede usar la vía oral, la alternativa es la vía <strong>subcutánea o intravenosa</strong>, nunca la intramuscular (dolorosa, absorción errática, contraindicada en cuidados paliativos).',ev:'SECPAL; OMS Guidelines Opioids 2021'},
{id:'sp1_3',n:'SP1-3',sec:'sp1',q:'[Manuela] Eritema cutáneo en sacro que no palidece con piel intacta. ¿A qué estadio de UPP corresponde?',opts:['Estadio I','Estadio II','Estadio III','Estadio IV'],ans:'A',exp:'<strong>Estadio I (NPUAP/EPUAP)</strong>: piel intacta con eritema no blanqueable. Es el estadio más precoz. Estadio II: pérdida parcial del espesor dérmico. Estadio III: pérdida total de espesor dérmico. Estadio IV: pérdida total de tejidos.',ev:'NPUAP/EPUAP/PPPIA 2019; GNEAUPP'},
{id:'sp1_4',n:'SP1-4',sec:'sp1',q:'[Manuela] ¿Cuál de estas medidas estaría indicada en el eritema cutáneo en sacro con piel intacta (UPP estadio I)?',opts:['Apósito de hidrogel','Colagenasas','Alginatos','Ácidos grasos hiperoxigenados'],ans:'D',exp:'En UPP estadio I (eritema no blanqueable, piel intacta), el tratamiento son los <strong>ácidos grasos hiperoxigenados (AGHO)</strong> aplicados sobre la zona afectada para mejorar la microcirculación local. Los hidrogeles, colagenasas y alginatos se usan en estadios con herida abierta.',ev:'GNEAUPP; NPUAP/EPUAP 2019'},
{id:'sp1_5',n:'SP1-5',sec:'sp1',q:'[Manuela] El diagnóstico enfermero (00047) "Riesgo de deterioro de la integridad cutánea", ¿en qué dominio NANDA se encuentra?',opts:['Dominio 4: Actividad reposo','Dominio 11: Seguridad-Protección','Dominio 12: Confort','Dominio 2: Nutrición'],ans:'B',exp:'El diagnóstico NANDA <strong>00047 "Riesgo de deterioro de la integridad cutánea"</strong> pertenece al <strong>Dominio 11: Seguridad/Protección</strong>, Clase 2: Lesión física.',ev:'NANDA-I 2021-2023 #00047'},
{id:'sp1_6',n:'SP1-6',sec:'sp1',q:'[Manuela] ¿Con cuál de los siguientes factores de riesgo NO está relacionado el diagnóstico (00047) "Riesgo de deterioro de la integridad cutánea"?',opts:['Deterioro del estado metabólico','Obesidad','Inmovilización física','Humedad'],ans:'B',exp:'La <strong>obesidad</strong> no está incluida como factor de riesgo del diagnóstico NANDA 00047 en la taxonomía. Los factores de riesgo incluyen: humedad, inmovilización, deterioro metabólico (diabetes, desnutrición), fricción/cizalla, edad extrema.',ev:'NANDA-I 2021-2023 #00047'},
{id:'sp1_7',n:'SP1-7',sec:'sp1',q:'[Manuela - EPOC] ¿Cuál de las siguientes medidas considera más prioritaria en un paciente diagnosticado de EPOC?',opts:['Vacunación antigripal','Vacunación neumococo','Mejorar el estado nutricional','Dejar de fumar'],ans:'D',exp:'La medida más eficaz y prioritaria en EPOC es <strong>dejar de fumar</strong>: es la única intervención que modifica la historia natural de la enfermedad y frena el deterioro de la función pulmonar. La vacunación y nutrición son medidas complementarias.',ev:'GOLD 2025'},
{id:'sp1_8',n:'SP1-8',sec:'sp1',q:'[Manuela] Para realizar gasometría en arteria radial, ¿cómo se comprueba la circulación colateral de la mano?',opts:['Test de Phalen','Signo de Durkan','Test de Tinel','Prueba de Allen'],ans:'D',exp:'La <strong>Prueba de Allen</strong> valora la circulación colateral de la mano (arco palmar) antes de la punción arterial radial: comprime ambas arterias (radial y cubital), el paciente cierra el puño, se suelta la cubital y se comprueba que la mano recupera el color (<7 seg = Allen positivo).',ev:'Gasometría arterial; Procedimientos enfermería'},
{id:'sp1_9',n:'SP1-9',sec:'sp1',q:'[Manuela] Gasometría: pH 7.462, pCO₂ 30 mmHg, pO₂ 63 mmHg, bicarbonato 21 mEq/l. ¿Qué trastorno ácido-base es?',opts:['Alcalosis respiratoria','Acidosis respiratoria','Alcalosis metabólica','Acidosis metabólica'],ans:'A',exp:'pH↑ (7.46, alcalótico) + pCO₂↓ (30 mmHg, primaria) + HCO₃ normal (21 mEq/l) = <strong>alcalosis respiratoria</strong> (hiperventilación). La hipoxemia (pO₂ 63) estimula la hiperventilación.',ev:'Gasometría arterial; interpretación ABG'},
{id:'sp1_10',n:'SP1-10',sec:'sp1',q:'[Manuela - DM] La hiperglucemia por efecto de las hormonas de ritmo circadiano se conoce como:',opts:['Hiperglucemia vespertina','Fenómeno del alba','Efecto Somogyi','Insulinización'],ans:'B',exp:'El <strong>Fenómeno del alba</strong>: hiperglucemia matutina (~4-8h) por secreción fisiológica circadiana de hormona de crecimiento y cortisol. El efecto Somogyi es una hiperglucemia de rebote tras hipoglucemia nocturna.',ev:'ADA Standards of Care 2026'},
{id:'sp1_11',n:'SP1-11',sec:'sp1',q:'[Manuela - DM] ¿Con cuáles de los siguientes hallazgos se puede decir que un paciente padece Diabetes Mellitus?',opts:['HbA1c es menor o igual a 6.5%','Glucemia plasmática casual mayor o igual a 200 mg/dl sin ningún otro síntoma','Glucemia plasmática tras SOG mayor o igual a 200 mg/dl','Glucemia plasmática basal en ayunas menor o igual a 120 mg/dl'],ans:'C',exp:'Criterios diagnósticos ADA de DM (se requiere confirmar en dos días salvo clínica clara): HbA1c ≥6.5%, glucemia basal ≥126 mg/dl, <strong>glucemia 2h post-SOG ≥200 mg/dl</strong>, glucemia casual ≥200 mg/dl CON síntomas. La opción B es incorrecta porque requiere síntomas (poliuria, polidipsia...); sin síntomas se debe confirmar.',ev:'ADA Standards of Care 2026'},
{id:'sp1_12',n:'SP1-12',sec:'sp1',q:'[Manuela - DM] ¿Cuál de las siguientes insulinas se utiliza para la dosis basal?',opts:['Lispro','Aspart','Glargina','Regular'],ans:'C',exp:'<strong>Glargina (Lantus®)</strong>: insulina de acción prolongada (~24h), sin pico, usada para cobertura basal. Lispro y Aspart son análogos de acción ultrarrápida (prandiales). Regular es de acción corta.',ev:'ADA 2026; Guía insulinas'},
{id:'sp1_13',n:'SP1-13',sec:'sp1',q:'[Manuela] Cuando decimos que una persona es hipertensa, estamos utilizando una variable:',opts:['Cuantitativa discreta','Cuantitativa continua','No utilizamos una variable','Cualitativa'],ans:'D',exp:'Hipertenso/No hipertenso es una variable <strong>cualitativa nominal dicotómica</strong> (o categórica). La TA en mmHg sería cuantitativa continua, pero la clasificación como hipertenso/normotensor es cualitativa.',ev:'Estadística básica'},
{id:'sp1_14',n:'SP1-14',sec:'sp1',q:'[Manuela] Al medir TA con manguito inadecuadamente pequeño, se obtendrán:',opts:['Cifras tensionales más elevadas que las reales','Cifras tensionales más disminuidas que las reales','No influye el tamaño del manguito','Solamente producirá molestias'],ans:'A',exp:'Un manguito <strong>demasiado pequeño</strong> subestima la anchura del brazo y requiere más presión para colapsar la arteria → <strong>lecturas falsamente elevadas</strong>. El manguito grande da lecturas falsamente bajas.',ev:'ESC/ESH HTA 2023; técnica medición TA'},
{id:'sp1_15',n:'SP1-15',sec:'sp1',q:'[Manuela] ¿A qué grupo farmacológico pertenece el enalapril?',opts:['Antagonista de los receptores de la angiotensina II (ARA II)','Betabloqueante','Inhibidores de la enzima conversora de angiotensina (IECA)','Calcioantagonista'],ans:'C',exp:'El <strong>enalapril</strong> es un profármaco que se convierte en enalaprilat (activo). Pertenece al grupo de los <strong>IECA</strong> (inhibe la ECA impidiendo la conversión de angiotensina I→II). Los ARA II bloquean el receptor, no la enzima.',ev:'Farmacología cardiovascular'},
{id:'sp1_r16',n:'SP1-R16',sec:'sp1',q:'¿Cuál de las siguientes escalas de valoración NO se utiliza en las úlceras por presión?',opts:['Escala de Ramsay','Escala de Norton','Escala EMINA','Escala de Braden'],ans:'A',exp:'La <strong>Escala de Ramsay</strong> evalúa el nivel de sedación en pacientes en UCI. Las escalas de Norton, EMINA y Braden son escalas específicas de valoración del riesgo de UPP.',ev:'GNEAUPP; ICU sedation scales'},
// SP2
{id:'sp2_1',n:'SP2-1',sec:'sp2',q:'[Antonio, 78 años. HTA, DM tipo 2, hipercolesterolemia, tabaquismo, obesidad IMC 33.2. Dolor rodillas y lumbar, bastón, caídas ocasionales.]\n\nEn el diagnóstico 00085 "Deterioro de la movilidad física", ¿cuál sería una intervención NIC?',opts:['Deambulación: caminata','Nivel de movilidad','Nivel de dolor','Fomento del ejercicio'],ans:'D',exp:'<strong>NIC 0200 "Fomento del ejercicio"</strong> es una intervención para el deterioro de la movilidad física. "Deambulación: caminata" y "Nivel de movilidad" son resultados NOC, no intervenciones NIC. "Nivel de dolor" es un resultado NOC.',ev:'NIC/NOC 2018-2020'},
{id:'sp2_2',n:'SP2-2',sec:'sp2',q:'[Antonio] ¿Qué escala se usará para valorar el equilibrio y la marcha?',opts:['Escala de Pfeiffer','Escala de Dowton','Escala de Tromp','Escala de Tinetti'],ans:'D',exp:'La <strong>Escala de Tinetti</strong> (POMA) evalúa <strong>equilibrio y marcha</strong> en ancianos: 16 ítems de equilibrio + 12 de marcha (máx 28). Pfeiffer = función cognitiva. Downton = riesgo de caídas. Tromp = screening caídas.',ev:'Tinetti ME. JAGS 1986'},
{id:'sp2_3',n:'SP2-3',sec:'sp2',q:'[Antonio] ¿Qué escala se usaría para valorar el apoyo social percibido de su paciente?',opts:['Escala de Reisberg','Escala de Blessed','Escala de Yesavage','Escala de Duke'],ans:'D',exp:'La <strong>Escala de Duke-UNC</strong> (Broadhead) evalúa el apoyo social funcional percibido (apoyo confidencial y afectivo). Reisberg = estadificación deterioro cognitivo (GDS). Blessed = función cognitiva. Yesavage = depresión geriátrica.',ev:'Broadhead WE et al. AJPH 1988'},
{id:'sp2_4',n:'SP2-4',sec:'sp2',q:'[Antonio] Como enfermera, ¿cuál estrategia de promoción de la salud en el anciano es correcta?',opts:['Ducharse una vez a la semana','No revisarse la presión arterial con regularidad','Ingerir una dieta rica en calcio, en fibras y baja en grasas','No caminar'],ans:'C',exp:'En el proceso de envejecimiento se recomienda una <strong>dieta rica en calcio</strong> (salud ósea), <strong>en fibras</strong> (tránsito intestinal) y <strong>baja en grasas saturadas</strong> (riesgo cardiovascular). Las demás opciones son contraindicadas.',ev:'Guías nutrición anciano; SENC'},
{id:'sp2_5',n:'SP2-5',sec:'sp2',q:'[Antonio] ¿Qué escala se usaría para valorar la sobrecarga en el cuidador?',opts:['Test de Zarit','Índice de Katz','Escala de Barthel','Índice de Lawton'],ans:'A',exp:'El <strong>Test de Zarit</strong> (22 ítems) evalúa la carga subjetiva del cuidador principal. Katz y Barthel evalúan AVD del paciente. Lawton evalúa AIVD del paciente.',ev:'Zarit SH et al. Gerontologist 1980'},
{id:'sp2_6',n:'SP2-6',sec:'sp2',q:'[Antonio, IMC 33.2] Según la SEEDO, ¿qué tipo de obesidad padece?',opts:['Obesidad II','Obesidad I','Obesidad mórbida','Sobrepeso'],ans:'B',exp:'Clasificación SEEDO: <18.5 delgadez; 18.5-24.9 normal; 25-26.9 sobrepeso grado I; 27-29.9 sobrepeso grado II; 30-34.9 <strong>obesidad grado I</strong>; 35-39.9 obesidad grado II; 40-49.9 obesidad mórbida; ≥50 obesidad extrema. IMC 33.2 = <strong>Obesidad I</strong>.',ev:'SEEDO 2007; GPC Obesidad'},
{id:'sp2_7',n:'SP2-7',sec:'sp2',q:'[Antonio] En el diagnóstico 00155 "Riesgo de caídas", ¿cuál sería un resultado esperado NOC?',opts:['Control del riesgo','Manejo ambiental: seguridad','Prevención de caídas','Vigilancia: seguridad'],ans:'A',exp:'<strong>NOC 1902 "Control del riesgo"</strong> es el resultado esperado para riesgo de caídas. "Manejo ambiental: seguridad" y "Prevención de caídas" son intervenciones NIC. "Vigilancia: seguridad" también es NIC.',ev:'NOC 2018; Moorhead et al.'},
{id:'sp2_8',n:'SP2-8',sec:'sp2',q:'[Antonio] En el diagnóstico 00001 "Desequilibrio nutricional por exceso", ¿cuál es una intervención NIC?',opts:['Control de peso','Estado nutricional','Modificación de la conducta','Estado nutricional: ingestión alimentaria y de líquidos'],ans:'A',exp:'<strong>NIC 1260 "Control del peso"</strong> es una intervención para el desequilibrio nutricional. "Estado nutricional" y "Estado nutricional: ingestión alimentaria" son resultados NOC. "Modificación de la conducta" es NIC pero menos específica para nutrición.',ev:'NIC 2018; Bulechek et al.'},
{id:'sp2_9',n:'SP2-9',sec:'sp2',q:'[Antonio] En el diagnóstico 00093 "Deterioro del patrón del sueño", ¿cuál sería un resultado esperado NOC?',opts:['Manejo del dolor','Manejo de la medicación','Descanso','Fomento del ejercicio'],ans:'C',exp:'<strong>NOC 0003 "Descanso"</strong> es el resultado esperado para deterioro del patrón del sueño. "Manejo del dolor" y "Manejo de la medicación" son intervenciones NIC. "Fomento del ejercicio" es NIC.',ev:'NOC 2018; Moorhead et al.'},
{id:'sp2_10',n:'SP2-10',sec:'sp2',q:'[Antonio - HTA] ¿Qué tipo de dieta estaría indicada para su HTA?',opts:['Dieta hídrica','Dieta blanda','Dieta absoluta','Dieta hiposódica'],ans:'D',exp:'La <strong>dieta hiposódica</strong> (<2g/día de Na o <5g/día de NaCl) es la recomendación dietética principal en la HTA. La dieta DASH también incluye restricción de sodio. Las demás opciones no tienen indicación en HTA.',ev:'ESC/ESH HTA 2023'},
{id:'sp2_11',n:'SP2-11',sec:'sp2',q:'[Antonio - deposiciones frecuentes] Para dieta baja en residuos, ¿cuál de estos alimentos estaría indicado?',opts:['Verduras','Carnes','Cereales con salvado','Frutas'],ans:'B',exp:'Dieta <strong>baja en residuos/fibra</strong>: se permiten <strong>carnes</strong> (sin piel ni grasa), pescados blancos, huevos, arroz blanco, pan blanco, lácteos. Están contraindicados: verduras, frutas, cereales integrales/salvado (alto contenido en fibra).',ev:'Dietética clínica; SECCAV'},
{id:'sp2_12',n:'SP2-12',sec:'sp2',q:'[Antonio] ¿Cuál de los siguientes criterios identificaría para determinar la fragilidad?',opts:['Menor de 65 años','Ningún ingreso hospitalario','Adecuado soporte social','Problemas cognitivos o afectivos'],ans:'D',exp:'Los criterios de fragilidad (Fried + SPPB) incluyen: <strong>deterioro cognitivo/afectivo</strong>, polifarmacia, pluripatología, hospitalización reciente, dependencia funcional, caídas. Edad >65 no es criterio por sí solo; el soporte social adecuado es protector.',ev:'Fried LP et al. J Gerontol 2001; SEMES Fragilidad 2022'},
{id:'sp2_13',n:'SP2-13',sec:'sp2',q:'[Antonio - polimedicado] ¿Qué test se usaría para conocer la adherencia al tratamiento farmacológico?',opts:['Test de Barber','Test de Isaacs','Test de Morisky-Green','Test de Aldrete'],ans:'C',exp:'El <strong>Test de Morisky-Green</strong> (4 preguntas) es el test más utilizado en AP para valorar la <strong>adherencia farmacológica</strong>. Test de Barber = screening fragilidad. Test de Isaacs = función cognitiva (Set Test). Test de Aldrete = recuperación anestesia.',ev:'Morisky DE, Green LW, Levine DM. 1986'},
{id:'sp2_14',n:'SP2-14',sec:'sp2',q:'[Antonio - escozor y dolor al orinar] ¿Cómo se denomina la micción dolorosa?',opts:['Oliguria','Disuria','Anuria','Polaquiuria'],ans:'B',exp:'<strong>Disuria</strong>: micción dolorosa o dificultosa. Oliguria: diuresis <500ml/24h. Anuria: diuresis <100ml/24h. Polaquiuria: aumento de la frecuencia miccional.',ev:'Semiología urológica'},
{id:'sp2_15',n:'SP2-15',sec:'sp2',q:'[Antonio - cuidadora cansada] En la etiqueta 00062 "Riesgo de cansancio del Rol del cuidador", ¿cuál sería un NOC esperado?',opts:['Salud emocional del cuidador principal','Potenciación de roles','Apoyo a la familia','Asesoramiento'],ans:'A',exp:'<strong>NOC 2506 "Salud emocional del cuidador principal"</strong> es el resultado esperado para el riesgo de cansancio del rol del cuidador. "Potenciación de roles", "Apoyo a la familia" y "Asesoramiento" son intervenciones NIC.',ev:'NOC 2018; Moorhead et al.'},
{id:'sp2_r16',n:'SP2-R16',sec:'sp2',q:'[Antonio] Entre las actuaciones en el domicilio para evitar accidentes, ¿cuál NO se encuentra?',opts:['Tener un regulador de temperatura en la ducha para evitar quemaduras','Control y manejo de la medicación en un lugar seguro, guardado en su envase de origen','Iluminación suficiente y regulable','La puerta del baño se abrirá hacia dentro'],ans:'D',exp:'La puerta del baño debe abrirse hacia <strong>FUERA</strong> (no hacia dentro): si el paciente cae dentro del baño y bloquea la puerta, esta puede abrirse hacia fuera para acceder. Es una medida de seguridad básica para el anciano.',ev:'Guías prevención caídas y accidentes domésticos; SEMES'}
];
