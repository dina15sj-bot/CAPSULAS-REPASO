<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test INGESA 2019 · Enfermería ATS/DUE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--accent:#1a6a6a;--accent-light:#e8f4f4;--accent-mid:#2a8a8a;--accent-dark:#0f4a4a;--cream:#f8f5f0;--white:#fff;--text:#1a1a2e;--muted:#5a5a7a;--ok:#1a7a3a;--ok-bg:#e8f5ee;--err:#c04020;--err-bg:#fdf0ec;--border:#ddd8d0;--shadow:0 2px 12px rgba(26,106,106,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
.hdr{background:var(--accent-dark);color:#fff;padding:22px 32px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr h1{font-family:'Playfair Display',serif;font-size:1.55rem;font-weight:900}
.hdr p{font-family:'JetBrains Mono',monospace;font-size:.7rem;opacity:.8;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:4px 12px;font-family:'JetBrains Mono',monospace;font-size:.68rem;color:#fff;white-space:nowrap}
.sbar{background:#fff;border-bottom:2px solid var(--accent-light);padding:10px 32px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.si{text-align:center}
.sn{font-family:'JetBrains Mono',monospace;font-size:1.25rem;font-weight:600;color:var(--accent);line-height:1}
.sl{font-size:.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px}
.sdiv{width:1px;height:34px;background:var(--border)}
.pbw{flex:1;min-width:140px}
.pbb{background:#e8e8e8;border-radius:4px;height:7px;overflow:hidden}
.pbf{background:linear-gradient(90deg,var(--accent),var(--accent-mid));height:100%;border-radius:4px;transition:width .4s;width:0}
.pl{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);margin-top:3px}
.btnr{margin-left:auto;background:var(--err);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:.7rem;cursor:pointer}
.fbar{background:#fff;padding:10px 32px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fbar span{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--muted);text-transform:uppercase}
.fb{padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-family:'JetBrains Mono',monospace;font-size:.68rem;cursor:pointer;color:var(--muted);transition:all .18s}
.fb.active,.fb:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.shdr{margin:20px 32px 0;padding:9px 18px;background:var(--accent);color:#fff;border-radius:8px 8px 0 0;font-family:'JetBrains Mono',monospace;font-size:.76rem;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:10px}
.sbadge{background:rgba(255,255,255,.25);border-radius:12px;padding:2px 10px;font-size:.66rem}
.scase{margin:0 32px;padding:16px 22px;background:#f0f8f8;border:1.5px solid #b0d8d8;border-top:none;font-size:.86rem;line-height:1.6}
.scase strong{color:var(--accent-dark);font-size:.74rem;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
.scase ul{margin:6px 0 0 18px}
.scase li{margin-bottom:2px}
.qs{padding:0 32px 32px}
.qc{background:#fff;border-radius:10px;border:1px solid var(--border);margin-top:10px;overflow:hidden;box-shadow:var(--shadow)}
.qc.ac{border-left:4px solid var(--ok)}
.qc.aw{border-left:4px solid var(--err)}
.qc.hidden{display:none}
.qnb{background:var(--accent-light);padding:5px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #c8e8e8}
.qnum{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:600;color:var(--accent-dark)}
.qtag{font-family:'JetBrains Mono',monospace;font-size:.63rem;border-radius:10px;padding:1px 8px;color:#fff}
.qtag.p{background:var(--accent)}
.qtag.reserva{background:#8a6a1a}
.qtag.sp1{background:#1a5a8a}
.qtag.sp2{background:#5a1a8a}
.qtag.obs{background:var(--err)}
.qtag.act{background:var(--ok)}
.qb{padding:13px 17px 9px}
.qt{font-size:.9rem;line-height:1.52;font-weight:600;margin-bottom:10px}
.obs-note{display:inline-block;background:#fff3e0;border:1px solid #e0a020;border-radius:5px;padding:3px 8px;font-size:.72rem;font-family:'JetBrains Mono',monospace;color:#7a4a00;margin-left:6px;font-weight:400;vertical-align:middle}
.opts{display:flex;flex-direction:column;gap:5px}
.ob{display:flex;align-items:flex-start;gap:9px;padding:7px 11px;border-radius:7px;border:1.5px solid var(--border);background:#fff;cursor:pointer;text-align:left;font-family:'Source Sans 3',sans-serif;font-size:.855rem;color:var(--text);transition:all .18s;line-height:1.42}
.ob:hover:not(:disabled){background:var(--accent-light);border-color:var(--accent)}
.ob .ol{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:600;color:var(--accent);background:var(--accent-light);border-radius:4px;padding:1px 5px;min-width:20px;text-align:center;margin-top:1px;flex-shrink:0}
.ob.oc{background:var(--ok-bg);border-color:var(--ok)}
.ob.oc .ol{background:var(--ok);color:#fff}
.ob.ow{background:var(--err-bg);border-color:var(--err)}
.ob.ow .ol{background:var(--err);color:#fff}
.ob:disabled{cursor:default}
.fb2{margin:8px 17px 12px;padding:9px 13px;border-radius:7px;font-size:.82rem;line-height:1.52;display:none}
.fb2.show{display:block}
.fb2.ok{background:var(--ok-bg);border-left:3px solid var(--ok);color:#0a4a20}
.fb2.fail{background:var(--err-bg);border-left:3px solid var(--err);color:#6a1a08}
.fb2 strong{display:block;font-family:'JetBrains Mono',monospace;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.fb2 .ev{margin-top:6px;padding:5px 9px;background:rgba(255,255,255,.6);border-radius:5px;font-size:.78rem;color:#333;border-left:2px solid #aaa}
.abadge{display:inline-block;background:var(--ok);color:#fff;border-radius:4px;padding:1px 7px;font-size:.68rem;font-family:'JetBrains Mono',monospace;margin-right:5px;vertical-align:middle}
.obadge{display:inline-block;background:var(--err);color:#fff;border-radius:4px;padding:1px 7px;font-size:.68rem;font-family:'JetBrains Mono',monospace;margin-right:5px;vertical-align:middle}
.sum{margin:20px 32px;padding:22px;background:#fff;border-radius:10px;border:2px solid var(--accent);display:none}
.sum.show{display:block}
.sum h2{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--accent-dark);margin-bottom:14px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:14px}
.sb{text-align:center;padding:10px;border-radius:8px}
.sb.t{background:var(--accent-light)}.sb.c{background:var(--ok-bg)}.sb.w{background:var(--err-bg)}.sb.s{background:#f5f5f5}
.sb .sn2{font-family:'JetBrains Mono',monospace;font-size:1.7rem;font-weight:700;line-height:1}
.sb .sl2{font-size:.72rem;color:var(--muted);margin-top:3px;font-family:'JetBrains Mono',monospace;text-transform:uppercase}
.nf{font-family:'JetBrains Mono',monospace;font-size:.95rem;color:var(--accent-dark);font-weight:600}
.abox{margin:0 32px 10px;padding:11px 17px;background:#fff8e6;border:1.5px solid #e0c060;border-radius:8px;font-size:.8rem;color:#5a4000;line-height:1.52}
.abox strong{font-family:'JetBrains Mono',monospace;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:#7a5500}
@media(max-width:800px){.hdr,.sbar,.fbar,.qs{padding-left:12px;padding-right:12px}.shdr,.scase,.sum,.abox{margin-left:12px;margin-right:12px}.hdr h1{font-size:1.2rem}}
</style>
</head>

<div class="hdr">
  <div>
    <h1>Test INGESA 2019 · Enfermería ATS/DUE</h1>

<div class="sbar">

    <div class="sb t"><div class="sn2" id="smT">0</div><div class="sl2">Respondidas</div></div>
