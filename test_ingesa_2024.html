<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST INGESA 2024 · Enfermero/a · OPE Acceso Fijo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f8f5f0;
    --white: #ffffff;
    --accent: #6a1a8a;
    --accent-dark: #42106a;
    --accent-light: #f0e8ff;
    --gold: #c09010;
    --gold-light: #fffce6;
    --red: #c04020;
    --green: #1a7a3a;
    --green-light: #e8f5ec;
    --red-light: #fdf0ed;
    --orange: #e07020;
    --text: #1a1a2e;
    --text-soft: #4a4a6a;
    --border: #d8d0c8;
    --border-light: #ece8e2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 60%, #9a3aaa 100%);
    padding: 28px 32px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,255,255,0.03) 20px, rgba(255,255,255,0.03) 40px);
  }
  .site-header::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--gold), #e0c020, var(--gold));
  }
  .site-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: #fff;
    letter-spacing: 1px;
    position: relative;
  }
  .site-header .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.75);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
    position: relative;
  }
  .header-pills {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin-top: 14px; position: relative;
  }
  .pill {
    background: rgba(255,255,255,0.15);
    color: #fff;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    border: 1px solid rgba(255,255,255,0.25);
  }
  .pill.gold { background: rgba(192,144,16,0.35); border-color: rgba(224,192,32,0.5); }

  /* STICKY CONTROLS */
  .controls {
    background: var(--white);
    border-bottom: 2px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 16px rgba(106,26,138,0.08);
  }
  .controls-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .filter-btn {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    cursor: pointer;
    color: var(--text-soft);
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .spacer { flex: 1; }
  .score-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent-dark);
    background: var(--accent-light);
    padding: 5px 12px;
    border-radius: 6px;
    white-space: nowrap;
    border: 1px solid rgba(106,26,138,0.2);
  }
  .reset-btn {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 5px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: 0.5px;
  }
  .reset-btn:hover { opacity: 0.85; }

  /* MAIN */
  .main-wrapper {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* PROGRESS */
  .progress-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 5px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #c060e0);
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* SECTION HEADER */
  .section-header {
    background: var(--accent);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px 8px 0 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 32px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-header.supuesto { background: #1a5a8a; }
  .section-header.reserva { background: #5a4a30; }
  .section-count {
    background: rgba(255,255,255,0.25);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.65rem;
  }

  /* SUPUESTO CONTEXT BOX */
  .context-box {
    background: #eef4fb;
    border: 1.5px solid #b0c8e8;
    border-top: none;
    padding: 16px 20px;
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--text);
  }
  .context-box .ctx-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #1a5a8a;
    margin-bottom: 8px;
    font-weight: 700;
  }
  .context-box table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.84rem; }
  .context-box td { padding: 3px 8px; vertical-align: top; }
  .context-box td:first-child { font-weight: 600; white-space: nowrap; width: 160px; color: #1a5a8a; }
  .context-box tr:nth-child(even) td { background: rgba(255,255,255,0.5); }

  /* QUESTION CARD */
  .question-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-top: none;
    padding: 18px 20px;
    transition: all 0.15s;
  }
  .question-card:last-child { border-radius: 0 0 8px 8px; }
  .question-card + .question-card { border-top: 1px solid var(--border-light); }
  .question-card.answered-correct { border-left: 4px solid var(--green); }
  .question-card.answered-wrong { border-left: 4px solid var(--red); }
  .question-card.hidden { display: none; }

  .q-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .q-text {
    font-size: 0.96rem;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 12px;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 6px; }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 9px 13px;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    text-align: left;
    transition: all 0.15s;
    line-height: 1.45;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-light);
    transform: translateX(2px);
  }
  .option-btn:disabled { cursor: default; }
  .option-letter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.76rem;
    font-weight: 700;
    min-width: 20px;
    color: var(--accent);
    margin-top: 1px;
    flex-shrink: 0;
  }
  .option-btn.correct { background: var(--green-light); border-color: var(--green); }
  .option-btn.correct .option-letter { color: var(--green); }
  .option-btn.wrong { background: var(--red-light); border-color: var(--red); }
  .option-btn.wrong .option-letter { color: var(--red); }
  .option-btn.dimmed { opacity: 0.45; }

  /* EXPLANATION */
  .explanation {
    margin-top: 10px;
    background: var(--gold-light);
    border: 1px solid #e0c020;
    border-radius: 7px;
    padding: 11px 14px;
    font-size: 0.87rem;
    line-height: 1.55;
    display: none;
    animation: fadeIn 0.25s ease;
  }
  .explanation.show { display: block; }
  .explanation .exp-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 5px;
  }

  .result-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .badge-correct { background: var(--green-light); color: var(--green); border: 1px solid var(--green); }
  .badge-wrong { background: var(--red-light); color: var(--red); border: 1px solid var(--red); }

  /* SUMMARY */
  .summary-box {
    background: var(--white);
    border: 2px solid var(--accent);
    border-radius: 10px;
    padding: 28px;
    margin-top: 36px;
    text-align: center;
    display: none;
  }
  .summary-box.show { display: block; }
  .summary-score { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--accent); line-height: 1; }
  .summary-detail { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--text-soft); margin-top: 8px; letter-spacing: 1px; }
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
  .summary-stat { background: var(--cream); border-radius: 8px; padding: 14px; }
  .summary-stat .num { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; }
  .summary-stat .lbl { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-soft); margin-top: 4px; }
  .num-green { color: var(--green); }
  .num-red { color: var(--red); }
  .num-orange { color: var(--orange); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-3px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    .site-header h1 { font-size: 1.5rem; }
    .controls { padding: 10px 12px; gap: 7px; }
    .main-wrapper { padding: 14px 10px 40px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <h1>TEST INGESA 2024</h1>
  <div class="subtitle">OPE · Acceso a Personal Estatutario Fijo · Resolución 21-12-2022</div>
  <div class="header-pills">
    <span class="pill">Categoría: Enfermero/a</span>
    <span class="pill">100 + 10 Reserva Preguntas</span>
    <span class="pill">1 Supuesto Práctico</span>
    <span class="pill gold">★ Respuestas comentadas</span>
  </div>
</header>

<div class="controls">
  <span class="controls-label">Ver:</span>
  <button class="filter-btn active" onclick="filterQ('all',event)">Todas</button>
  <button class="filter-btn" onclick="filterQ('unanswered',event)">Sin contestar</button>
  <button class="filter-btn" onclick="filterQ('wrong',event)">Falladas</button>
  <button class="filter-btn" onclick="filterQ('correct',event)">Correctas</button>
  <div class="spacer"></div>
  <div class="score-display" id="scoreDisplay">0 / 0 respondidas</div>
  <button class="reset-btn" onclick="resetAll()">↺ Reiniciar</button>
</div>

<div class="main-wrapper">
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div id="questionsContainer"></div>
  <div class="summary-box" id="summaryBox">
    <div class="summary-score" id="summaryScore">—</div>
    <div class="summary-detail" id="summaryDetail">RESULTADO FINAL</div>
    <div class="summary-grid">
      <div class="summary-stat"><div class="num num-green" id="statCorrect">0</div><div class="lbl">✓ Correctas</div></div>
      <div class="summary-stat"><div class="num num-red" id="statWrong">0</div><div class="lbl">✗ Falladas</div></div>
      <div class="summary-stat"><div class="num num-orange" id="statSkipped">0</div><div class="lbl">— Sin contestar</div></div>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
  // ——— PRIMERA PARTE ———
  {id:1, sec:'primera',
   text:'¿Cuál de los siguientes enunciados NO se encuentra entre los usos principales de la Epidemiología?',
   opts:['Establecimiento de normas de organización y de la atención médica.','Establecer la magnitud y distribución de la salud-enfermedad.','Completar cuadros clínicos.','Describir la historia natural de la enfermedad y de los determinantes de su curso.'],
   ans:0,
   exp:'<strong>A es correcta.</strong> Establecer normas de organización sanitaria pertenece a la gestión y política sanitaria, no a la Epidemiología. Los usos epidemiológicos son: describir distribución de enfermedades, identificar factores de riesgo, completar cuadros clínicos, evaluar intervenciones y describir la historia natural.'
  },
  {id:2, sec:'primera',
   text:'¿A qué tipo de DM corresponde: "Se caracteriza por producción insuficiente y/o uso metabólico ineficiente de la insulina. Es el tipo más frecuente, alcanzando el 90% de la enfermedad diagnosticada"?',
   opts:['Diabetes Mellitus Tipo 1 (DM1).','Diabetes Mellitus Tipo 2 (DM2).','Diabetes gestacional (DG).','Diabetes Insípida.'],
   ans:1,
   exp:'<strong>B es correcta.</strong> La DM2 representa el 90-95% de todos los casos de diabetes. Se caracteriza por resistencia a la insulina y déficit relativo de secreción. La DM1 es autoinmune con destrucción de células beta. La diabetes insípida no es una hiperglucemia, sino un trastorno de la hormona ADH.'
  },
  {id:3, sec:'primera',
   text:'Los TCA o Trastornos de la Conducta Alimentaria (señale la respuesta FALSA):',
   opts:['Son una de las enfermedades crónicas más frecuentes en adolescentes y mujeres jóvenes.','Es una alteración del patrón de ingesta o de la conducta sobre el control del peso que produce un deterioro biopsicosocial.','La anorexia nerviosa y la bulimia nerviosa son TCA.','El trastorno por atracones no es TCA.'],
   ans:3,
   exp:'<strong>D es la FALSA.</strong> El trastorno por atracones (binge eating disorder) SÍ es un TCA reconocido en el DSM-5 desde 2013. Los TCA incluyen: anorexia nerviosa, bulimia nerviosa, trastorno por atracones, ARFID (evitación/restricción), pica y trastorno de rumiación.'
  },
  {id:4, sec:'primera',
   text:'De las siguientes vacunas, ¿cuál se podría utilizar de forma segura durante la gestación?',
   opts:['Triple vírica.','Gripe.','Varicela.','VPH.'],
   ans:1,
   exp:'<strong>B es correcta.</strong> La vacuna de la gripe (inactivada) es SEGURA y RECOMENDADA en cualquier trimestre del embarazo. Las vacunas de virus vivos atenuados (triple vírica, varicela) están CONTRAINDICADAS en el embarazo. La VPH no tiene datos suficientes y se pospone al postparto.'
  },
  {id:5, sec:'primera',
   text:'Entre los diagnósticos NANDA más prevalentes en DM, el "Manejo inefectivo del régimen terapéutico", ¿qué Intervenciones/NIC serían adecuadas?',
   opts:['Aumentar el afrontamiento.','Autoanálisis de glucemia.','Cuidado de los pies.','Educación proceso de enfermedad y Modificación de la conducta.'],
   ans:3,
   exp:'<strong>D es correcta.</strong> Para el diagnóstico "Manejo inefectivo del régimen terapéutico" las NIC más adecuadas son la educación sobre el proceso de la enfermedad (5602) y la modificación de la conducta (4360), ya que abordan directamente la causa del manejo inefectivo: déficit de conocimientos y conductas inadaptadas.'
  },
  {id:6, sec:'primera',
   text:'La ecuación de Harris-Benedict:',
   opts:['Calcula las necesidades calóricas en función de talla, peso y edad.','Calcula el porcentaje de superficie total quemada en un paciente con quemaduras masivas.','Calcula el grado de empatía que tiene el personal sanitario.','Calcula el índice de masa corporal.'],
   ans:0,
   exp:'<strong>A es correcta.</strong> La ecuación de Harris-Benedict calcula el Gasto Energético Basal (GEB) en función de peso, talla, edad y sexo. Para hombres: GEB = 66 + (13,7×peso) + (5×talla) – (6,8×edad). Para mujeres: GEB = 655 + (9,6×peso) + (1,8×talla) – (4,7×edad).'
  },
  {id:7, sec:'primera',
   text:'En relación con la cartera de servicios comunes del SNS, señale la respuesta correcta:',
   opts:['No puede ser actualizada más que transcurrido un plazo de 10 años desde su aprobación.','Su actualización no requiere la participación de las Comunidades Autónomas.','Es preciso acuerdo del Consejo Interterritorial del Sistema Nacional de Salud.','Para incorporar nuevas técnicas basta con que haya sido evaluada por un órgano propuesto por una CCAA.'],
   ans:2,
   exp:'<strong>C es correcta.</strong> Según la Ley 16/2003, la cartera de servicios comunes del SNS se actualiza mediante acuerdo del Consejo Interterritorial del SNS. No hay plazo mínimo de 10 años (A falsa). La participación de las CCAA es necesaria (B falsa). No basta con la evaluación de una sola CCAA (D falsa).'
  },
  {id:8, sec:'primera',
   text:'El procedimiento en el que se inactivan todas las formas vegetativas bacterianas, virus, hongos y la mayoría de esporas para conseguir un nivel adecuado para uso seguro en el paciente es:',
   opts:['Asepsia.','Desinfección de nivel medio.','Antisepsia.','Desinfección de nivel alto.'],
   ans:3,
   exp:'<strong>D es correcta.</strong> La <strong>desinfección de alto nivel (DAN)</strong> elimina todos los microorganismos excepto esporas bacterianas en alta concentración (inactiva la mayoría). Se usa para material semicrítico que contacta mucosas. La esterilización elimina TODAS las formas incluyendo esporas. La DAN se logra con glutaraldehído, ácido peracético, H₂O₂.'
  },
  {id:9, sec:'primera',
   text:'Respecto a las úlceras por presión (UPP) indique la respuesta correcta:',
   opts:['Constituyen un problema clínico no evitable.','La incidencia de las UPP es un indicador de la calidad de los cuidados prestados.','La prevalencia de las UPP no es un indicador de la calidad de los cuidados prestados.','Para prevenirlas hay que aumentar la presión de los puntos de apoyo.'],
   ans:1,
   exp:'<strong>B es correcta.</strong> La incidencia de UPP es un indicador centinela de la CALIDAD de los cuidados de enfermería. Las UPP son MAYORITARIAMENTE prevenibles (A falsa). La prevalencia también es indicador de calidad (C falsa). La prevención requiere REDUCIR la presión en puntos de apoyo (D falsa).'
  },
  {id:10, sec:'primera',
   text:'En relación a las vacunas frente al VPH registradas en España, indique la respuesta FALSA:',
   opts:['Son vacunas inactivadas.','No tienen efecto terapéutico sobre la infección ya establecida.','Se obtienen por técnicas de recombinación genética.','La suspensión inyectable es transparente.'],
   ans:0,
   exp:'<strong>A es la FALSA.</strong> Las vacunas VPH (Gardasil 9, Cervarix) son vacunas de <strong>subunidades proteicas</strong> (partículas similares al virus, VLP), NO virus inactivados completos. Se producen por recombinación genética (C verdadera). No tienen efecto terapéutico (B verdadera). La suspensión es transparente/blanco lechoso (D verdadera).'
  },
  {id:11, sec:'primera',
   text:'El patrón hormonal del climaterio consiste en:',
   opts:['Un aumento de estrógenos.','Una disminución de gonadotropinas.','Un descenso de estrógenos.','Un aumento de progestágenos.'],
   ans:2,
   exp:'<strong>C es correcta.</strong> En el climaterio los ovarios dejan de producir estrógenos → <strong>descenso de estrógenos y progesterona</strong>. Por feedback negativo, las gonadotropinas (FSH, LH) AUMENTAN compensatoriamente. FSH >40 UI/L confirma menopausia. El patrón es: ↓ estrógenos + ↑ FSH + ↑ LH.'
  },
  {id:12, sec:'primera',
   text:'Según la profundidad de las lesiones, las quemaduras se clasifican en:',
   opts:['Quemaduras epidérmicas o de primer grado, dérmicas o de segundo grado, subdérmicas o de tercer grado.','Epidérmicas/1er grado, dérmicas superficiales/2º grado, dérmicas profundas/3er grado, subdérmicas/4º grado.','Epidérmicas/4º grado, dérmicas superficiales/3er grado, dérmicas profundas/2º grado, subdérmicas/1er grado.','Epidérmicas/3er grado, dérmicas/2º grado, subdérmicas/1er grado.'],
   ans:0,
   exp:'<strong>A es correcta.</strong> Clasificación clásica en 3 grados: <strong>1º/Epidérmicas</strong> (eritema, sin ampollas), <strong>2º/Dérmicas</strong> (ampollas, superficiales o profundas), <strong>3º/Subdérmicas</strong> (destrucción total de la dermis, aspecto apergaminado, indoloras). Algunos autores añaden 4º grado (afecta hueso/músculo).'
  },
  {id:13, sec:'primera',
   text:'Entre los diagnósticos NANDA relacionados con la colocación y cuidados de la sonda nasogástrica, indique la INCORRECTA:',
   opts:['Riesgo de aspiración.','Riesgo de deterioro de la integridad cutánea.','Riesgo de infecciones asociado a cirrosis hepática.','Riesgo de úlcera por presión.'],
   ans:2,
   exp:'<strong>C es la INCORRECTA.</strong> "Riesgo de infección asociado a cirrosis hepática" no es un diagnóstico NANDA relacionado con el procedimiento de colocación de SNG. Los diagnósticos relacionados son: riesgo de aspiración, riesgo de deterioro de la integridad cutánea (por presión alar nasal), riesgo de UPP, y desequilibrio nutricional.'
  },

  {id:87, sec:'primera',

// ─── STATE ───────────────────────────────────
let answered = {};

// ─── BUILD ───────────────────────────────────
function buildQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';
  const SECTIONS = [
    {key:'primera', label:'PRIMERA PARTE — Cuestionario Test', count:'100 preguntas', ctx:null},
    {key:'reserva', label:'PREGUNTAS DE RESERVA', count:'Preguntas 101-110', ctx:null},
    {key:'supuesto', label:'SEGUNDA PARTE — Supuesto Práctico', count:'10 preguntas + 1 reserva', ctx:'supuesto'}
  ];

  const contextHTML = `
    <div class="context-box">
      <div class="ctx-title">📋 Caso clínico — Paciente 77 años</div>
      <p>Mujer de 77 años acude a urgencias hospitalarias derivada por MAP por empeoramiento de sintomatología: disnea intensa y nerviosismo brusco con sofocación. Tratada en CS con metilprednisolona IM y salbutamol inhalado.</p>
      <table>
        <tr><td>Antecedentes</td><td>HTA, dislipemia, EPOC, insuf. venosa crónica, síndrome depresivo, apendicectomía (2001), déficit vitamina D, hipotiroidismo</td></tr>
        <tr><td>Medicación</td><td>Omeprazol 20mg, Candesartán 16mg, Beclometasona/Formoterol 100/6mcg inh, Simvastatina 20mg, Escitalopram 20mg, Salbutamol 100mcg s.p., Lorazepam 1mg, Levotiroxina 75mcg, Optovite 1000mcg IM/mensual</td></tr>
        <tr><td>Constantes</td><td>TA: 170/70 mmHg · FC: 91 lpm · SatO₂: 94% basal · Tª: 36,3°C</td></tr>
        <tr><td>Exploración</td><td>Eupneica en reposo; taquipnea en decúbito 45°. ACP: rítmica sin soplos. AP: hipoventilación difusa. Obesidad grado I. EEII: edema leve bilateral, pulsos presentes</td></tr>
        <tr><td>ECG</td><td>Ritmo sinusal 75 lpm, T negativas V1-V3, QRS estrecho</td></tr>
        <tr><td>Analítica</td><td>pH 7,34 · pO₂ 62 mmHg · pCO₂ 46 mmHg · HCO₃⁻ 27 · PCR 0,66 · DíD 765 · Crea 1,96 · Urea 80 · Leuco 7,20 · Hb 12,6 · Plt 280.000 · INR 0,84</td></tr>
      </table>
    </div>`;

  SECTIONS.forEach(sec => {
    const qs = QUESTIONS.filter(q => q.sec === sec.key);
    if (!qs.length) return;
    const header = document.createElement('div');
    header.className = `section-header${sec.key === 'supuesto' ? ' supuesto' : sec.key === 'reserva' ? ' reserva' : ''}`;
    header.innerHTML = `${sec.label} <span class="section-count">${sec.count}</span>`;
    container.appendChild(header);
    if (sec.ctx === 'supuesto') container.insertAdjacentHTML('beforeend', contextHTML);
    qs.forEach(q => {
      const card = document.createElement('div');
      card.className = 'question-card';
      card.id = `qcard-${q.id}`;
      const letters = ['A','B','C','D'];
      const optHtml = q.opts.map((opt,i) => `
        <button class="option-btn" id="opt-${q.id}-${i}" onclick="selectAnswer('${q.id}',${i})">
          <span class="option-letter">${letters[i]}</span><span>${opt}</span>
        </button>`).join('');
      card.innerHTML = `
        <div class="q-number">PREGUNTA ${q.id} <span id="badge-${q.id}"></span></div>
        <div class="q-text">${q.text}</div>
        <div class="options">${optHtml}</div>
        <div class="explanation" id="exp-${q.id}">
          <div class="exp-header">★ Comentario · Clave de respuesta</div>
          <p>${q.exp}</p>
        </div>`;
      container.appendChild(card);
    });
  });
}

function selectAnswer(qid, sel) {
  if (answered[qid] !== undefined) return;
  const q = QUESTIONS.find(q => String(q.id) === String(qid));
  answered[qid] = sel;
  const isOk = sel === q.ans;
  const card = document.getElementById(`qcard-${qid}`);
  card.classList.add(isOk ? 'answered-correct' : 'answered-wrong');
  document.getElementById(`badge-${qid}`).innerHTML =
    `<span class="result-badge ${isOk ? 'badge-correct' : 'badge-wrong'}">${isOk ? '✓ CORRECTO' : '✗ INCORRECTO'}</span>`;
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById(`opt-${qid}-${i}`);
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === sel && !isOk) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  }
  document.getElementById(`exp-${qid}`).classList.add('show');
  updateScore();
}

function updateScore() {
  const total = QUESTIONS.length;
  const ans = Object.keys(answered).length;
  let correct = 0;
  Object.entries(answered).forEach(([qid, sel]) => {
    const q = QUESTIONS.find(q => String(q.id) === String(qid));
    if (q && sel === q.ans) correct++;
  });
  document.getElementById('scoreDisplay').textContent = `${correct} correctas · ${ans}/${total} respondidas`;
  document.getElementById('progressBar').style.width = (ans/total*100) + '%';
  if (ans === total) showSummary(correct, ans);
}

function showSummary(correct, total) {
  const wrong = total - correct;
  const pct = Math.round((correct/total)*100);
  document.getElementById('summaryScore').textContent = pct + '%';
  document.getElementById('summaryDetail').textContent = `${correct} correctas de ${total} respondidas`;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statSkipped').textContent = QUESTIONS.length - total;
  document.getElementById('summaryBox').classList.add('show');
}

function filterQ(mode, e) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  QUESTIONS.forEach(q => {
    const card = document.getElementById(`qcard-${q.id}`);
    if (!card) return;
    let show = true;
    if (mode === 'unanswered') show = answered[q.id] === undefined;
    else if (mode === 'wrong') show = answered[q.id] !== undefined && answered[q.id] !== q.ans;
    else if (mode === 'correct') show = answered[q.id] !== undefined && answered[q.id] === q.ans;
    card.classList.toggle('hidden', !show);
  });
  document.querySelectorAll('.section-header').forEach(h => {
    let next = h.nextElementSibling, vis = false;
    while (next && !next.classList.contains('section-header')) {
      if (!next.classList.contains('hidden') && next.classList.contains('question-card')) vis = true;
      next = next.nextElementSibling;
    }
    h.style.display = vis ? '' : 'none';
  });
}

function resetAll() {
  if (!confirm('¿Reiniciar el test? Se perderán todas las respuestas.')) return;
  answered = {};
  document.getElementById('summaryBox').classList.remove('show');
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('scoreDisplay').textContent = '0 / 0 respondidas';
  document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  buildQuestions();
}

buildQuestions();
updateScore();
</script>
